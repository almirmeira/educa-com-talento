# ===================================
# NGINX - EDUCA COM TALENTO
# Configuração segura — OWASP Top 10 + CIS Benchmarks
# Ambiente: VM local (HTTP, sem SSL)
# ===================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Formato de log
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # CIS Benchmarks — ocultar versão do servidor
    server_tokens off;

    # TLS — preparado para quando SSL for ativado
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml;

    # OWASP A04 / CIS — Rate limiting zones
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Timeouts defensivos (CIS)
    client_body_timeout   30;
    client_header_timeout 30;
    send_timeout          30;
    client_max_body_size  100M;

    # Upstream para o site Next.js
    upstream nextjs_upstream {
        server site:3000;
        keepalive 64;
    }

    # Incluir configurações adicionais
    include /etc/nginx/conf.d/*.conf;
}
