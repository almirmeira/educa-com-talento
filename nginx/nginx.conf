
# Site principal — educacomtalento.com
server {
    server_name educacomtalento.com www.educacomtalento.com;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/educacomtalento.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/educacomtalento.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

# Moodle — cursos.educacomtalento.com
server {
    server_name cursos.educacomtalento.com;

    client_max_body_size 100M;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/educacomtalento.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/educacomtalento.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = www.educacomtalento.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = educacomtalento.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name educacomtalento.com www.educacomtalento.com;
    return 404; # managed by Certbot




}
server {
    if ($host = cursos.educacomtalento.com) {
        return 301 https://$host$request_uri;
