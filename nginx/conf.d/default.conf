# ===================================
# VIRTUAL HOST - EDUCA COM TALENTO
# Configuração segura — OWASP Top 10 + CIS Benchmarks
# Ambiente: VM local (HTTP, sem SSL)
# ===================================

server {
    listen 80;
    listen [::]:80;
    server_name educacomtalento.com.br www.educacomtalento.com.br _;

    # -------------------------------------------------------
    # OWASP A02 / CIS — Headers de segurança
    # -------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self'; frame-ancestors 'self';" always;

    # -------------------------------------------------------
    # OWASP A04 — Rate limiting e proteção de endpoints
    # -------------------------------------------------------
    limit_req zone=general burst=20 nodelay;
    limit_conn addr 10;
    client_max_body_size 100M;

    # Timeouts — CIS Benchmarks
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
    client_body_timeout   30;
    client_header_timeout 30;
    send_timeout          30;

    # -------------------------------------------------------
    # Proxy para Next.js
    # -------------------------------------------------------
    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Assets estáticos Next.js — cache longo
    location /_next/static {
        proxy_pass http://nextjs_upstream;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Imagens otimizadas Next.js
    location /_next/image {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check interno
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Bloquear acesso a arquivos ocultos (OWASP A05)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Bloquear extensões sensíveis
    location ~* \.(env|git|htaccess|htpasswd|ini|log|sh|sql|bak|conf)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # OWASP A07 — Rate limiting no login do Moodle (via proxy 8080)
    location /moodle/login {
        limit_req zone=login burst=5 nodelay;
        return 404;
    }
}
