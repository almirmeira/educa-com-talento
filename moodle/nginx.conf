worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 512M;

    # CIS Benchmarks — ocultar versão do servidor
    server_tokens off;

    # Timeouts defensivos
    client_body_timeout   30;
    client_header_timeout 30;
    send_timeout          30;

    # OWASP A04 — Rate limiting para Moodle
    limit_req_zone $binary_remote_addr zone=moodle:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=moodle_login:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=moodle_conn:10m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    server {
        listen 80;
        server_name _;

        # OWASP A02 / CIS — Headers de segurança para Moodle
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-src 'self'; frame-ancestors 'self';" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Rate limiting geral (excluindo login que tem zona própria)
        limit_req zone=moodle burst=30 nodelay;
        limit_conn moodle_conn 15;

        root /var/www/html;
        index index.php index.html;

        # -------------------------------------------------------
        # dataroot interno (X-Accel-Redirect)
        # ^~ garante prioridade sobre regex de extensoes estaticas
        # Deve vir ANTES de qualquer location regex
        # -------------------------------------------------------
        location ^~ /dataroot/ {
            internal;
            alias /var/moodledata/;
        }

        # OWASP A07 — Rate limiting reforçado no login
        location ~ ^/login {
            limit_req zone=moodle_login burst=5 nodelay;
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            fastcgi_pass moodle:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param PATH_INFO        $fastcgi_path_info;
            fastcgi_param SCRIPT_FILENAME  $document_root$fastcgi_script_name;
            fastcgi_param SCRIPT_NAME      $fastcgi_script_name;
            fastcgi_param SERVER_NAME      $host;
            fastcgi_read_timeout 300;
        }

        # -------------------------------------------------------
        # Arquivos PHP com PATH_INFO (lib/javascript.php/rev/...)
        # -------------------------------------------------------
        location ~ [^/]\.php(/|$) {
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            fastcgi_pass moodle:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param PATH_INFO        $fastcgi_path_info;
            fastcgi_param SCRIPT_FILENAME  $document_root$fastcgi_script_name;
            fastcgi_param SCRIPT_NAME      $fastcgi_script_name;
            fastcgi_param SERVER_NAME      $host;
            fastcgi_read_timeout 300;
        }

        # -------------------------------------------------------
        # Arquivos estaticos com cache longo
        # -------------------------------------------------------
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp4|webm|webp|pdf)$ {
            expires max;
            log_not_found off;
        }

        # Negar arquivos ocultos
        location ~ /\.(?!well-known) {
            deny all;
        }

        # Fallback para todas as outras URLs
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }
    }
}
