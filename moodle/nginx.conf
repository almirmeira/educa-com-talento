worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 512M;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    server {
        listen 80;
        server_name _;

        root /var/www/html;
        index index.php index.html;

        # -------------------------------------------------------
        # dataroot interno (X-Accel-Redirect)
        # ^~ garante prioridade sobre regex de extensoes estaticas
        # Deve vir ANTES de qualquer location regex
        # -------------------------------------------------------
        location ^~ /dataroot/ {
            internal;
            alias /var/moodledata/;
        }

        # -------------------------------------------------------
        # Arquivos PHP com PATH_INFO (lib/javascript.php/rev/...)
        # -------------------------------------------------------
        location ~ [^/]\.php(/|$) {
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            fastcgi_pass moodle:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param PATH_INFO        $fastcgi_path_info;
            fastcgi_param SCRIPT_FILENAME  $document_root$fastcgi_script_name;
            fastcgi_param SCRIPT_NAME      $fastcgi_script_name;
            fastcgi_param SERVER_NAME      $host;
            fastcgi_read_timeout 300;
        }

        # -------------------------------------------------------
        # Arquivos estaticos com cache longo
        # -------------------------------------------------------
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp4|webm|webp|pdf)$ {
            expires max;
            log_not_found off;
        }

        # Negar arquivos ocultos
        location ~ /\.(?!well-known) {
            deny all;
        }

        # Fallback para todas as outras URLs
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }
    }
}
