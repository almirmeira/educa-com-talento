services:
  # MariaDB para Moodle
  moodle_db:
    image: mariadb:10.6
    container_name: educa-mariadb
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=RootPass2024!
      - MYSQL_DATABASE=moodle
      - MYSQL_USER=moodle
      - MYSQL_PASSWORD=MoodlePass2024!
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - educa-network

  # Moodle LMS
  moodle:
    image: ellakcy/moodle:mysql_maria_fpm_alpine
    container_name: educa-moodle
    restart: unless-stopped
    environment:
      - MOODLE_URL=https://cursos.educacomtalento.com
      - MOODLE_ADMIN=admin
      - MOODLE_ADMIN_PASSWORD=Acm123!@#
      - MOODLE_ADMIN_EMAIL=contato@educacomtalento.com.br
      - MOODLE_DB_HOST=moodle_db
      - MOODLE_DB_NAME=moodle
      - MOODLE_DB_USER=moodle
      - MOODLE_DB_PASSWORD=MoodlePass2024!
      - MOODLE_SITENAME=Educa com Talento - Cursos Online
      - MOODLE_LANG=pt_br
      - MOODLE_SSL=true
    volumes:
      - moodle_www:/var/www/html
      - moodledata:/var/moodledata
    depends_on:
      moodle_db:
        condition: service_healthy
    networks:
      - educa-network

  # Nginx para Moodle (porta 80) - com moodledata para X-Accel-Redirect
  moodle_nginx:
    image: nginx:alpine
    container_name: educa-moodle-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - moodle_www:/var/www/html:ro
      - /opt/educa-com-talento/moodle/nginx.conf:/etc/nginx/nginx.conf:ro
      - moodledata:/var/moodledata:ro
    depends_on:
      - moodle
    networks:
      - educa-network

  # Website Next.js
  site:
    build:
      context: /opt/educa-com-talento/site
      dockerfile: Dockerfile
    container_name: educa-site
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - educa-network

networks:
  educa-network:
    driver: bridge

volumes:
  mariadb_data:
  moodle_www:
  moodledata:

