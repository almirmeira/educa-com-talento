<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f2e"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f0c060;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0f0f2e;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="triniGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c060"/>
      <stop offset="50%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="7" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="600" fill="url(#bgGrad)"/>

  <!-- Background radial glow -->
  <circle cx="450" cy="310" r="250" fill="url(#centerGlow)"/>

  <!-- Stars -->
  <circle cx="30" cy="50" r="1" fill="white" opacity="0.5"/>
  <circle cx="860" cy="40" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="50" cy="530" r="1" fill="white" opacity="0.3"/>
  <circle cx="870" cy="540" r="1" fill="white" opacity="0.4"/>
  <circle cx="200" cy="25" r="1" fill="white" opacity="0.6"/>
  <circle cx="750" cy="575" r="1" fill="white" opacity="0.3"/>
  <circle cx="100" cy="300" r="1" fill="white" opacity="0.2"/>
  <circle cx="800" cy="320" r="1" fill="white" opacity="0.3"/>

  <!-- Header -->
  <rect x="0" y="0" width="900" height="72" fill="#0d0d28" opacity="0.9"/>
  <rect x="0" y="70" width="900" height="2" fill="#f0c060" opacity="0.6"/>
  <text x="30" y="30" font-family="Arial, sans-serif" font-size="11" fill="#f0c060" opacity="0.8" letter-spacing="2">MÓDULO 06</text>
  <text x="30" y="56" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#f0c060" filter="url(#glow)" letter-spacing="1">Mesa Quântica — Geometria Sagrada da Cura</text>
  <text x="870" y="42" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">3 Aulas · 60 min</text>

  <!-- CENTER: Main Mesa Quantionica diagram -->
  <rect x="270" y="82" width="360" height="400" rx="14" fill="#1e1e4e" stroke="#f0c060" stroke-width="2" opacity="0.95"/>
  <text x="450" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0c060" letter-spacing="1">MESA QUANTIÔNICA</text>

  <!-- Outer sacred geometry: Star of David (6-pointed) -->
  <!-- Triangle up -->
  <polygon points="450,130 530,270 370,270" fill="none" stroke="#f0c060" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
  <!-- Triangle down -->
  <polygon points="450,290 370,150 530,150" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.7" filter="url(#glow)"/>

  <!-- Inner hexagon (intersection of the two triangles) -->
  <polygon points="450,150 490,170 490,210 450,230 410,210 410,170" fill="#1a1a3e" stroke="#f0c060" stroke-width="1" opacity="0.8"/>

  <!-- Geometric ring around -->
  <circle cx="450" cy="210" r="95" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <circle cx="450" cy="210" r="110" fill="none" stroke="#f0c060" stroke-width="0.6" stroke-dasharray="6,4" opacity="0.35"/>

  <!-- Eye of Horus in center -->
  <!-- Outer eye shape -->
  <ellipse cx="450" cy="210" rx="42" ry="22" fill="#0f0f2e" stroke="#f0c060" stroke-width="2" filter="url(#glow)"/>
  <!-- Iris -->
  <circle cx="450" cy="210" r="16" fill="#1a1a3e" stroke="#f0c060" stroke-width="1.5"/>
  <!-- Pupil -->
  <circle cx="450" cy="210" r="9" fill="#f0c060" filter="url(#strongGlow)"/>
  <!-- Eye highlight -->
  <circle cx="446" cy="207" r="3" fill="white" opacity="0.7"/>
  <!-- Eye lashes/decorations -->
  <path d="M408,210 L418,218" stroke="#f0c060" stroke-width="1.5" opacity="0.7"/>
  <path d="M492,210 L482,202" stroke="#f0c060" stroke-width="1.5" opacity="0.7"/>
  <path d="M435,196 L430,185" stroke="#f0c060" stroke-width="1" opacity="0.5"/>
  <path d="M450,194 L450,182" stroke="#f0c060" stroke-width="1" opacity="0.5"/>
  <path d="M465,196 L470,185" stroke="#f0c060" stroke-width="1" opacity="0.5"/>

  <!-- Labels around center -->
  <text x="450" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fde68a">Olho de Horus</text>
  <text x="450" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#94a3b8">Centro de Irradiação Quântica</text>

  <!-- Chama Trina -->
  <text x="450" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e2e8f0">CHAMA TRINA</text>

  <!-- Three flames -->
  <!-- Blue flame (left - Poder) -->
  <path d="M415,350 Q408,320 415,300 Q422,285 420,270 Q428,280 424,295 Q434,278 430,265 Q440,278 436,295 Q440,285 437,270 Q445,285 442,300 Q446,320 440,350 Z" fill="#60a5fa" opacity="0.9" filter="url(#glow)"/>
  <text x="425" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#60a5fa" font-weight="bold">Poder</text>
  <text x="425" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">Fé · Vontade</text>

  <!-- Yellow flame (center - Sabedoria) -->
  <path d="M450,350 Q440,315 448,290 Q452,272 450,258 Q460,272 457,290 Q462,272 465,258 Q466,278 462,295 Q470,278 468,265 Q474,280 470,298 Q474,315 460,350 Z" fill="#fbbf24" opacity="0.9" filter="url(#strongGlow)"/>
  <text x="450" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#fbbf24" font-weight="bold">Sabedoria</text>
  <text x="450" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">Cristo · Cura</text>

  <!-- Pink/rose flame (right - Amor) -->
  <path d="M485,350 Q478,320 484,300 Q490,285 488,270 Q496,280 492,295 Q502,278 498,265 Q507,280 503,295 Q508,285 504,270 Q512,285 508,300 Q512,320 492,350 Z" fill="#f472b6" opacity="0.9" filter="url(#glow)"/>
  <text x="480" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#f472b6" font-weight="bold">Amor</text>
  <text x="480" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">Compaixão</text>

  <!-- Merkaba (star tetrahedron hint) -->
  <text x="450" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Merkabá · Metatron · Geometria Sagrada</text>
  <text x="450" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#a78bfa" font-style="italic">Estrutura quântica de informação e cura</text>
  <text x="450" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#f0c060" font-weight="bold">★ Instrumento de Decodificação Quântica ★</text>

  <!-- Fibonacci/sacred geometry corner patterns -->
  <!-- top-left corner decoration -->
  <circle cx="285" cy="98" r="8" fill="none" stroke="#f0c060" stroke-width="1" opacity="0.5"/>
  <circle cx="285" cy="98" r="4" fill="none" stroke="#f0c060" stroke-width="1" opacity="0.5"/>
  <!-- top-right -->
  <circle cx="615" cy="98" r="8" fill="none" stroke="#f0c060" stroke-width="1" opacity="0.5"/>
  <circle cx="615" cy="98" r="4" fill="none" stroke="#f0c060" stroke-width="1" opacity="0.5"/>
  <!-- bottom-left -->
  <circle cx="285" cy="468" r="8" fill="none" stroke="#f0c060" stroke-width="1" opacity="0.5"/>
  <circle cx="285" cy="468" r="4" fill="none" stroke="#f0c060" stroke-width="1" opacity="0.5"/>
  <!-- bottom-right -->
  <circle cx="615" cy="468" r="8" fill="none" stroke="#f0c060" stroke-width="1" opacity="0.5"/>
  <circle cx="615" cy="468" r="4" fill="none" stroke="#f0c060" stroke-width="1" opacity="0.5"/>

  <!-- LEFT PANEL: What is the Mesa -->
  <rect x="18" y="82" width="240" height="400" rx="12" fill="#1e1e4e" stroke="#a78bfa" stroke-width="1" opacity="0.9"/>
  <text x="138" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a78bfa" letter-spacing="0.5">O QUE É A MESA</text>

  <text x="138" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Sistema terapêutico de</text>
  <text x="138" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">alta frequência vibratória</text>

  <rect x="28" y="150" width="220" height="50" rx="6" fill="#0f0f2e" stroke="#f0c060" stroke-width="0.8"/>
  <text x="138" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#fde68a">"A Mesa Quantiônica é um conjunto</text>
  <text x="138" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#fde68a">de símbolos e geometrias sagradas</text>
  <text x="138" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#fde68a">que ativam o campo quântico."</text>

  <!-- 6 elements list -->
  <rect x="28" y="210" width="220" height="258" rx="6" fill="#0f0f2e" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="138" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa" font-weight="bold">Elementos da Mesa</text>
  <line x1="32" y1="234" x2="244" y2="234" stroke="#a78bfa" stroke-width="0.5" opacity="0.4"/>
  <text x="38" y="250" font-family="Arial, sans-serif" font-size="9" fill="#f0c060">★ Olho de Horus</text>
  <text x="38" y="263" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  visão do Alto Eu</text>
  <text x="38" y="279" font-family="Arial, sans-serif" font-size="9" fill="#60a5fa">★ Estrela de Davi</text>
  <text x="38" y="292" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  como acima, como abaixo</text>
  <text x="38" y="308" font-family="Arial, sans-serif" font-size="9" fill="#f472b6">★ Chama Trina</text>
  <text x="38" y="321" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  amor, sabedoria e poder</text>
  <text x="38" y="337" font-family="Arial, sans-serif" font-size="9" fill="#34d399">★ Merkabá</text>
  <text x="38" y="350" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  veículo de luz multidimensional</text>
  <text x="38" y="366" font-family="Arial, sans-serif" font-size="9" fill="#fbbf24">★ Flor da Vida</text>
  <text x="38" y="379" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  padrão criador do universo</text>
  <text x="38" y="395" font-family="Arial, sans-serif" font-size="9" fill="#a78bfa">★ Cubo de Metatron</text>
  <text x="38" y="408" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  formas platônicas de criação</text>
  <text x="38" y="424" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">★ Triângulo Sagrado</text>
  <text x="38" y="437" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  trindade: corpo-mente-espírito</text>
  <text x="38" y="453" font-family="Arial, sans-serif" font-size="9" fill="#60a5fa">★ Mandalas de Cura</text>
  <text x="38" y="466" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  padrões de harmonia</text>

  <!-- RIGHT PANEL: How to use -->
  <rect x="642" y="82" width="240" height="400" rx="12" fill="#1e1e4e" stroke="#34d399" stroke-width="1" opacity="0.9"/>
  <text x="762" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#34d399" letter-spacing="0.5">COMO USAR A MESA</text>

  <rect x="652" y="118" width="220" height="348" rx="6" fill="#0f0f2e" stroke="#34d399" stroke-width="0.8"/>
  <text x="762" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34d399" font-weight="bold">Protocolo de Aplicação</text>
  <line x1="656" y1="144" x2="868" y2="144" stroke="#34d399" stroke-width="0.5" opacity="0.4"/>

  <text x="660" y="162" font-family="Arial, sans-serif" font-size="9" fill="#6ee7b7" font-weight="bold">1. Preparação do Espaço</text>
  <text x="660" y="175" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  Limpeza energética do ambiente</text>
  <text x="660" y="193" font-family="Arial, sans-serif" font-size="9" fill="#6ee7b7" font-weight="bold">2. Conexão com Mestres de Luz</text>
  <text x="660" y="206" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  Invocação de guias espirituais</text>
  <text x="660" y="224" font-family="Arial, sans-serif" font-size="9" fill="#6ee7b7" font-weight="bold">3. Ativação da Mesa</text>
  <text x="660" y="237" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  Pronunciar mantras de ativação</text>
  <text x="660" y="255" font-family="Arial, sans-serif" font-size="9" fill="#6ee7b7" font-weight="bold">4. Diagnóstico Quântico</text>
  <text x="660" y="268" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  Identificar desequilíbrios</text>
  <text x="660" y="286" font-family="Arial, sans-serif" font-size="9" fill="#6ee7b7" font-weight="bold">5. Tratamento com Intenção</text>
  <text x="660" y="299" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  Focar nas geometrias corretas</text>
  <text x="660" y="317" font-family="Arial, sans-serif" font-size="9" fill="#6ee7b7" font-weight="bold">6. Ancoragem de Luz</text>
  <text x="660" y="330" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  Fixar novas informações no campo</text>
  <text x="660" y="348" font-family="Arial, sans-serif" font-size="9" fill="#6ee7b7" font-weight="bold">7. Fechamento e Gratidão</text>
  <text x="660" y="361" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  Encerrar o campo sagrado</text>

  <rect x="656" y="378" width="212" height="80" rx="4" fill="#1a3a1a" stroke="#34d399" stroke-width="0.8"/>
  <text x="762" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#34d399" font-weight="bold">Indicações Terapêuticas</text>
  <text x="660" y="412" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">● Doenças emocionais e psíquicas</text>
  <text x="660" y="425" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">● Bloqueios energéticos e kármicos</text>
  <text x="660" y="438" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">● Amplificação de processos de cura</text>
  <text x="660" y="451" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">● Evolução espiritual acelerada</text>

  <!-- Footer -->
  <rect x="0" y="545" width="900" height="55" fill="#0d0d28" opacity="0.85"/>
  <line x1="0" y1="545" x2="900" y2="545" stroke="#f0c060" stroke-width="1" opacity="0.4"/>
  <text x="450" y="566" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Módulo 06 · Terapeuta de Si Mesmo · Educa com Talento</text>
  <text x="450" y="582" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#f0c060" font-style="italic">"Geometria sagrada é a linguagem que o universo usa para criar a realidade."</text>
</svg>
