<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f2e"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="pendulumGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c060"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fieldGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="600" fill="url(#bgGrad)"/>

  <!-- Stars -->
  <circle cx="40" cy="60" r="1" fill="white" opacity="0.5"/>
  <circle cx="860" cy="50" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="70" cy="500" r="1" fill="white" opacity="0.3"/>
  <circle cx="830" cy="490" r="1" fill="white" opacity="0.5"/>
  <circle cx="200" cy="30" r="1" fill="white" opacity="0.4"/>
  <circle cx="750" cy="570" r="1" fill="white" opacity="0.3"/>

  <!-- Header -->
  <rect x="0" y="0" width="900" height="72" fill="#0d0d28" opacity="0.9"/>
  <rect x="0" y="70" width="900" height="2" fill="#34d399" opacity="0.5"/>
  <text x="30" y="30" font-family="Arial, sans-serif" font-size="11" fill="#34d399" opacity="0.8" letter-spacing="2">MÓDULO 03</text>
  <text x="30" y="56" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#f0c060" filter="url(#glow)" letter-spacing="1">Radiestesia — A Arte da Sensibilidade Energética</text>
  <text x="870" y="42" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">4 Aulas · 90 min</text>

  <!-- Etymology banner -->
  <rect x="220" y="82" width="460" height="36" rx="10" fill="#1e2a1e" stroke="#34d399" stroke-width="1.5"/>
  <text x="450" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" letter-spacing="1">ETIMOLOGIA</text>
  <text x="450" y="111" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#34d399" font-weight="bold" filter="url(#glow)">RADIUS + AISTHESIS = Sensibilidade à Radiação</text>

  <!-- LEFT PANEL: Pendulum -->
  <rect x="18" y="128" width="260" height="390" rx="12" fill="#1e1e4e" stroke="#f0c060" stroke-width="1" opacity="0.9"/>
  <text x="148" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f0c060" letter-spacing="1">O PÊNDULO</text>

  <!-- Hand holding string -->
  <ellipse cx="148" cy="180" rx="18" ry="10" fill="#8b6914" opacity="0.8"/>
  <text x="148" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fde68a">✋</text>

  <!-- String swinging -->
  <line x1="148" y1="190" x2="130" y2="320" stroke="#fde68a" stroke-width="1.5" opacity="0.8"/>
  <line x1="148" y1="190" x2="165" y2="320" stroke="#fde68a" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>

  <!-- Pendulum bob -->
  <polygon points="130,320 120,345 140,345" fill="url(#pendulumGrad)" filter="url(#glow)"/>
  <circle cx="130" cy="350" r="10" fill="url(#pendulumGrad)" filter="url(#glow)"/>

  <!-- Motion arcs -->
  <path d="M90,230 Q148,210 205,230" stroke="#f0c060" stroke-width="1" fill="none" opacity="0.5" stroke-dasharray="4,3"/>
  <path d="M80,260 Q148,235 215,260" stroke="#f0c060" stroke-width="0.8" fill="none" opacity="0.3" stroke-dasharray="4,3"/>

  <!-- Meanings of pendulum movements -->
  <rect x="30" y="375" width="230" height="132" rx="8" fill="#0f0f2e" stroke="#f0c060" stroke-width="0.8"/>
  <text x="145" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#f0c060">Movimentos do Pêndulo</text>
  <line x1="35" y1="400" x2="255" y2="400" stroke="#f0c060" stroke-width="0.5" opacity="0.4"/>
  <text x="45" y="416" font-family="Arial, sans-serif" font-size="9" fill="#34d399">↻ Circular horário</text>
  <text x="165" y="416" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">= SIM / positivo</text>
  <text x="45" y="431" font-family="Arial, sans-serif" font-size="9" fill="#f472b6">↺ Anti-horário</text>
  <text x="165" y="431" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">= NÃO / negativo</text>
  <text x="45" y="446" font-family="Arial, sans-serif" font-size="9" fill="#60a5fa">↔ Horizontal</text>
  <text x="165" y="446" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">= neutro</text>
  <text x="45" y="461" font-family="Arial, sans-serif" font-size="9" fill="#fbbf24">↕ Vertical</text>
  <text x="165" y="461" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">= atenção</text>
  <text x="45" y="476" font-family="Arial, sans-serif" font-size="9" fill="#a78bfa">◎ Elíptico</text>
  <text x="165" y="476" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">= transição</text>
  <text x="45" y="494" font-family="Arial, sans-serif" font-size="9" fill="#f0c060">⊡ Estático</text>
  <text x="165" y="494" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">= bloqueio</text>

  <!-- CENTER PANEL: Human energy field -->
  <rect x="292" y="128" width="315" height="390" rx="12" fill="#1e1e4e" stroke="#a78bfa" stroke-width="1" opacity="0.9"/>
  <text x="450" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#a78bfa" letter-spacing="1">CAMPO ENERGÉTICO HUMANO</text>

  <!-- Human silhouette -->
  <!-- Head -->
  <circle cx="450" cy="220" r="28" fill="#1a1a3e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="450" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#a78bfa">☯</text>
  <!-- Body -->
  <rect x="433" y="249" width="34" height="75" rx="6" fill="#1a1a3e" stroke="#a78bfa" stroke-width="1"/>
  <!-- Arms -->
  <line x1="433" y1="265" x2="405" y2="295" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
  <line x1="467" y1="265" x2="495" y2="295" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="440" y1="324" x2="432" y2="370" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
  <line x1="460" y1="324" x2="468" y2="370" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>

  <!-- Energy field layers -->
  <ellipse cx="450" cy="295" rx="55" ry="90" fill="none" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.8" filter="url(#glow)"/>
  <text x="510" y="225" font-family="Arial, sans-serif" font-size="7.5" fill="#f472b6">Etérico</text>
  <ellipse cx="450" cy="295" rx="80" ry="115" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
  <text x="535" y="220" font-family="Arial, sans-serif" font-size="7.5" fill="#a78bfa">Astral</text>
  <ellipse cx="450" cy="295" rx="108" ry="140" fill="none" stroke="#60a5fa" stroke-width="0.8" stroke-dasharray="5,5" opacity="0.5"/>
  <text x="560" y="215" font-family="Arial, sans-serif" font-size="7.5" fill="#60a5fa">Mental</text>
  <ellipse cx="450" cy="295" rx="135" ry="162" fill="none" stroke="#34d399" stroke-width="0.6" stroke-dasharray="6,6" opacity="0.4"/>
  <text x="587" y="208" font-family="Arial, sans-serif" font-size="7.5" fill="#34d399">Causal</text>

  <!-- Chakra points -->
  <circle cx="450" cy="207" r="6" fill="#a78bfa" filter="url(#glow)"/> <!-- Corona -->
  <circle cx="450" cy="220" r="4" fill="#60a5fa" filter="url(#glow)"/> <!-- Ajha -->
  <circle cx="450" cy="254" r="5" fill="#34d399" filter="url(#glow)"/> <!-- Garganta -->
  <circle cx="450" cy="272" r="6" fill="#34d399" opacity="0.8"/> <!-- Coração -->
  <circle cx="450" cy="288" r="5" fill="#fbbf24"/> <!-- Plexo -->
  <circle cx="450" cy="304" r="5" fill="#f472b6"/> <!-- Sacral -->
  <circle cx="450" cy="324" r="5" fill="#f0c060"/> <!-- Base -->

  <!-- Radiestesia detection lines -->
  <path d="M360,250 Q400,240 435,260" stroke="#f0c060" stroke-width="1.5" fill="none" opacity="0.6" stroke-dasharray="3,2" filter="url(#glow)"/>
  <path d="M360,285 Q400,275 432,285" stroke="#f0c060" stroke-width="1.5" fill="none" opacity="0.5" stroke-dasharray="3,2"/>
  <text x="360" y="310" font-family="Arial, sans-serif" font-size="8" fill="#fde68a">detecção</text>
  <text x="360" y="322" font-family="Arial, sans-serif" font-size="8" fill="#fde68a">radiestésica</text>

  <!-- Pendulum small icon -->
  <line x1="340" y1="235" x2="350" y2="270" stroke="#f0c060" stroke-width="1.5" opacity="0.7"/>
  <circle cx="350" cy="274" r="6" fill="#f0c060" opacity="0.7" filter="url(#glow)"/>

  <!-- Frequency note -->
  <rect x="310" y="390" width="270" height="52" rx="6" fill="#0f0f2e" stroke="#34d399" stroke-width="0.8"/>
  <text x="445" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6ee7b7" font-weight="bold">O radiestesista detecta variações</text>
  <text x="445" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">no campo eletromagnético e bioenergético</text>
  <text x="445" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">através do sistema nervoso e do pêndulo.</text>

  <!-- RIGHT PANEL: Frequency Scale -->
  <rect x="622" y="128" width="260" height="390" rx="12" fill="#1e1e4e" stroke="#34d399" stroke-width="1" opacity="0.9"/>
  <text x="752" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#34d399" letter-spacing="1">ESCALA VIBRACIONAL</text>

  <!-- Scale bar -->
  <rect x="690" y="170" width="28" height="310" rx="6" fill="none" stroke="#34d399" stroke-width="1"/>
  <!-- Fill gradient -->
  <rect x="691" y="171" width="26" height="50" rx="3" fill="#a78bfa" opacity="0.9"/>
  <rect x="691" y="221" width="26" height="50" rx="3" fill="#60a5fa" opacity="0.85"/>
  <rect x="691" y="271" width="26" height="50" rx="3" fill="#34d399" opacity="0.8"/>
  <rect x="691" y="321" width="26" height="50" rx="3" fill="#fbbf24" opacity="0.75"/>
  <rect x="691" y="371" width="26" height="50" rx="3" fill="#f472b6" opacity="0.7"/>
  <rect x="691" y="421" width="26" height="59" rx="3" fill="#f87171" opacity="0.65"/>

  <!-- Scale labels -->
  <text x="727" y="200" font-family="Arial, sans-serif" font-size="9" fill="#a78bfa" font-weight="bold">900+ Hz</text>
  <text x="727" y="213" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Êxtase/Espírito</text>
  <text x="727" y="250" font-family="Arial, sans-serif" font-size="9" fill="#60a5fa" font-weight="bold">600 Hz</text>
  <text x="727" y="263" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Paz/Serenidade</text>
  <text x="727" y="300" font-family="Arial, sans-serif" font-size="9" fill="#34d399" font-weight="bold">500 Hz</text>
  <text x="727" y="313" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Amor/Cura</text>
  <text x="727" y="350" font-family="Arial, sans-serif" font-size="9" fill="#fbbf24" font-weight="bold">310 Hz</text>
  <text x="727" y="363" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Disposição</text>
  <text x="727" y="400" font-family="Arial, sans-serif" font-size="9" fill="#f472b6" font-weight="bold">150 Hz</text>
  <text x="727" y="413" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Raiva/Medo</text>
  <text x="727" y="455" font-family="Arial, sans-serif" font-size="9" fill="#f87171" font-weight="bold">20 Hz</text>
  <text x="727" y="468" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Vergonha</text>

  <!-- Arrow up -->
  <polygon points="704,168 698,178 710,178" fill="#34d399" filter="url(#glow)"/>
  <text x="704" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#34d399">frequência</text>

  <!-- Radiestesia measures -->
  <text x="752" y="508" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">O pêndulo responde a variações</text>
  <text x="752" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">no campo energético medindo</text>
  <text x="752" y="532" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#34d399" font-weight="bold">entre 6 e 900+ Unidades Bovis</text>

  <!-- Footer -->
  <rect x="0" y="545" width="900" height="55" fill="#0d0d28" opacity="0.85"/>
  <line x1="0" y1="545" x2="900" y2="545" stroke="#34d399" stroke-width="1" opacity="0.3"/>
  <text x="450" y="566" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Módulo 03 · Terapeuta de Si Mesmo · Educa com Talento</text>
  <text x="450" y="582" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#34d399" font-style="italic">"Sensibilidade não é fraqueza — é o instrumento mais preciso do terapeuta."</text>
</svg>
