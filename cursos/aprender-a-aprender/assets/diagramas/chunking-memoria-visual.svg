<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="500" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="14" font-weight="bold" fill="#00d4ff">Chunking: Como Especialistas Comprimem Informação</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#a0a0b0">Chase &amp; Simon (1973) — Mestres de Xadrez | Carnegie Mellon University</text>

  <!-- Left panel: SEM CHUNKING -->
  <rect x="20" y="74" width="280" height="230" rx="10" fill="#1e1e36" stroke="#ff6b6b" stroke-width="2"/>
  <text x="160" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#ff6b6b">SEM CHUNKING</text>

  <!-- Scattered digits -->
  <text x="55"  y="138" font-size="15" font-weight="bold" fill="#e0e0e0" opacity="0.9">1</text>
  <text x="100" y="148" font-size="15" font-weight="bold" fill="#e0e0e0" opacity="0.85">9</text>
  <text x="72"  y="175" font-size="15" font-weight="bold" fill="#e0e0e0" opacity="0.9">4</text>
  <text x="140" y="135" font-size="15" font-weight="bold" fill="#e0e0e0" opacity="0.85">5</text>
  <text x="195" y="158" font-size="15" font-weight="bold" fill="#e0e0e0" opacity="0.9">2</text>
  <text x="118" y="195" font-size="15" font-weight="bold" fill="#e0e0e0" opacity="0.85">0</text>
  <text x="165" y="192" font-size="15" font-weight="bold" fill="#e0e0e0" opacity="0.9">1</text>
  <text x="220" y="188" font-size="15" font-weight="bold" fill="#e0e0e0" opacity="0.85">1</text>

  <!-- Label -->
  <text x="160" y="240" text-anchor="middle" font-size="12" fill="#ff6b6b">8 itens independentes</text>
  <text x="160" y="260" text-anchor="middle" font-size="12" fill="#a0a0b0">Memória de trabalho: sobrecarregada</text>
  <text x="160" y="280" text-anchor="middle" font-size="12" fill="#a0a0b0">Capacidade: ~7 itens (Miller, 1956)</text>

  <!-- Right panel: COM CHUNKING -->
  <rect x="600" y="74" width="280" height="230" rx="10" fill="#1a261e" stroke="#26de81" stroke-width="2"/>
  <text x="740" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#26de81">COM CHUNKING</text>

  <!-- Chunks displayed -->
  <rect x="625" y="112" width="100" height="46" rx="8" fill="#26de81" opacity="0.15" stroke="#26de81" stroke-width="1.5"/>
  <text x="675" y="142" text-anchor="middle" font-size="14" font-weight="bold" fill="#26de81">1945</text>

  <rect x="745" y="112" width="100" height="46" rx="8" fill="#26de81" opacity="0.15" stroke="#26de81" stroke-width="1.5"/>
  <text x="795" y="142" text-anchor="middle" font-size="14" font-weight="bold" fill="#26de81">2011</text>

  <text x="740" y="185" text-anchor="middle" font-size="12" fill="#26de81">2 chunks significativos</text>
  <text x="740" y="207" text-anchor="middle" font-size="12" fill="#a0a0b0">Memória de trabalho: liberta</text>
  <text x="740" y="227" text-anchor="middle" font-size="12" fill="#a0a0b0">Capacidade: muito mais informação</text>
  <text x="740" y="248" text-anchor="middle" font-size="12" fill="#a0a0b0">1945=fim da 2ª Guerra | 2011=era</text>
  <text x="740" y="268" text-anchor="middle" font-size="13" fill="#a0a0b0">digital — significado comprimido</text>

  <!-- Middle brain icon and arrow -->
  <ellipse cx="450" cy="155" rx="48" ry="42" fill="#22204a" stroke="#ff9f43" stroke-width="2"/>
  <!-- simple brain curves -->
  <path d="M432,142 Q425,130 436,122 Q450,116 462,122 Q472,130 468,142" stroke="#ff9f43" stroke-width="2" fill="none"/>
  <path d="M435,150 Q428,160 440,168 Q450,174 460,168 Q472,160 465,150" stroke="#ff9f43" stroke-width="2" fill="none"/>
  <path d="M432,142 Q432,152 435,150" stroke="#ff9f43" stroke-width="1.5" fill="none"/>
  <path d="M468,142 Q468,152 465,150" stroke="#ff9f43" stroke-width="1.5" fill="none"/>
  <text x="450" y="205" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff9f43">Chunking</text>

  <!-- Arrows from left to center and center to right -->
  <path d="M302,160 L395,158" stroke="#ff9f43" stroke-width="2.5" fill="none" marker-end="url(#arrOrange)"/>
  <path d="M502,158 L598,158" stroke="#ff9f43" stroke-width="2.5" fill="none" marker-end="url(#arrOrange)"/>

  <!-- Bottom section: Novato vs Expert (Chess) -->
  <rect x="20" y="322" width="860" height="158" rx="10" fill="#16213e" stroke="#2a2a4a" stroke-width="1.5"/>
  <text x="450" y="348" text-anchor="middle" font-size="12" font-weight="bold" fill="#e0e0e0">O Experimento do Xadrez — Chase &amp; Simon (1973)</text>

  <!-- Novato side -->
  <rect x="40" y="360" width="370" height="106" rx="8" fill="#1e1e36" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="225" y="382" text-anchor="middle" font-size="12" font-weight="bold" fill="#ff6b6b">Novato</text>
  <text x="225" y="402" text-anchor="middle" font-size="12" fill="#e0e0e0">Vê 32 peças individuais</text>
  <text x="225" y="422" text-anchor="middle" font-size="12" fill="#a0a0b0">Memória de trabalho: sobrecarregada</text>
  <text x="225" y="442" text-anchor="middle" font-size="12" fill="#a0a0b0">Reprodução da posição: ~30% de acerto</text>
  <text x="225" y="460" text-anchor="middle" font-size="12" fill="#ff6b6b">Com peças aleatórias: mesmo resultado</text>

  <!-- Expert side -->
  <rect x="490" y="360" width="370" height="106" rx="8" fill="#1a261e" stroke="#26de81" stroke-width="1.5"/>
  <text x="675" y="382" text-anchor="middle" font-size="12" font-weight="bold" fill="#26de81">Grande Mestre</text>
  <text x="675" y="402" text-anchor="middle" font-size="12" fill="#e0e0e0">Vê 5–7 formações estratégicas (chunks)</text>
  <text x="675" y="422" text-anchor="middle" font-size="12" fill="#a0a0b0">Memória de trabalho: opera com padrões</text>
  <text x="675" y="442" text-anchor="middle" font-size="12" fill="#a0a0b0">Reprodução da posição: ~95% de acerto</text>
  <text x="675" y="460" text-anchor="middle" font-size="12" fill="#ff6b6b">Com peças aleatórias: ~30% (igual novato)</text>

  <defs>
    <marker id="arrOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9f43"/>
    </marker>
  </defs>
</svg>
