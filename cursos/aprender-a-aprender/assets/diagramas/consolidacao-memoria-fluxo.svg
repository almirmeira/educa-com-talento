<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="580" viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="580" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e0e0e0" font-size="20" font-weight="bold">Consolidação da Memória — Fluxo da Informação</text>
  <text x="450" y="60" text-anchor="middle" fill="#a0a0b0" font-size="13">Do mundo externo à Memória de Longo Prazo | Miller (1956) · Cowan (2001)</text>

  <!-- ========================================= -->
  <!-- BOX 1: MUNDO EXTERNO / MEMÓRIA SENSORIAL -->
  <!-- ========================================= -->
  <rect x="20" y="90" width="160" height="120" rx="10" fill="#0d1b3e" stroke="#4a6fa5" stroke-width="2"/>
  <rect x="20" y="90" width="160" height="34" rx="10" fill="#1e3a6e"/>
  <rect x="20" y="112" width="160" height="12" fill="#1e3a6e"/>
  <text x="100" y="112" text-anchor="middle" fill="#7aaeff" font-size="12" font-weight="bold">ESTÍMULOS</text>
  <text x="100" y="132" text-anchor="middle" fill="#a0c0f0" font-size="10">👁️  Visão</text>
  <text x="100" y="148" text-anchor="middle" fill="#a0c0f0" font-size="10">👂  Audição</text>
  <text x="100" y="164" text-anchor="middle" fill="#a0c0f0" font-size="10">✋  Tato · Olfato</text>
  <text x="100" y="185" text-anchor="middle" fill="#6a8abf" font-size="9">Duração: 0,5 — 3 seg</text>
  <text x="100" y="200" text-anchor="middle" fill="#6a8abf" font-size="9">99% descartado</text>

  <!-- Arrow 1: Sensorial → Atenção -->
  <line x1="180" y1="150" x2="230" y2="150" stroke="#4a6fa5" stroke-width="2.5"/>
  <polygon points="230,144 242,150 230,156" fill="#4a6fa5"/>
  <text x="211" y="143" text-anchor="middle" fill="#6a8abf" font-size="9">ATENÇÃO</text>
  <text x="211" y="167" text-anchor="middle" fill="#6a8abf" font-size="9">1% passa</text>

  <!-- ========================================= -->
  <!-- BOX 2: MEMÓRIA DE TRABALHO -->
  <!-- ========================================= -->
  <rect x="242" y="80" width="200" height="200" rx="10" fill="#1a0e28" stroke="#9b59b6" stroke-width="2.5"/>
  <rect x="242" y="80" width="200" height="34" rx="10" fill="#2d1a44"/>
  <rect x="242" y="102" width="200" height="12" fill="#2d1a44"/>
  <text x="342" y="103" text-anchor="middle" fill="#c39bd3" font-size="13" font-weight="bold">MEMÓRIA DE TRABALHO</text>

  <!-- Capacity indicator -->
  <text x="342" y="128" text-anchor="middle" fill="#a080c0" font-size="10">Limite: 4 chunks (Cowan, 2001)</text>
  <text x="342" y="142" text-anchor="middle" fill="#7a60a0" font-size="9">Duração: 15 — 30 segundos</text>

  <!-- 4 chunk boxes -->
  <rect x="260" y="152" width="76" height="36" rx="5" fill="#3d1f60" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="298" y="174" text-anchor="middle" fill="#c39bd3" font-size="11">Chunk 1</text>

  <rect x="346" y="152" width="76" height="36" rx="5" fill="#3d1f60" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="384" y="174" text-anchor="middle" fill="#c39bd3" font-size="11">Chunk 2</text>

  <rect x="260" y="198" width="76" height="36" rx="5" fill="#3d1f60" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="298" y="220" text-anchor="middle" fill="#c39bd3" font-size="11">Chunk 3</text>

  <rect x="346" y="198" width="76" height="36" rx="5" fill="#3d1f60" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="384" y="220" text-anchor="middle" fill="#c39bd3" font-size="11">Chunk 4</text>

  <text x="342" y="257" text-anchor="middle" fill="#9b59b6" font-size="9">Processamento consciente</text>
  <text x="342" y="269" text-anchor="middle" fill="#9b59b6" font-size="9">Córtex pré-frontal</text>

  <!-- ========================================= -->
  <!-- TRASH (Esquecimento sem consolidação) -->
  <!-- ========================================= -->
  <!-- Arrow down to trash -->
  <line x1="342" y1="280" x2="342" y2="340" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="336,340 342,354 348,340" fill="#ff6b6b"/>

  <rect x="270" y="355" width="144" height="70" rx="8" fill="#2a0808" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="342" y="376" text-anchor="middle" fill="#ff6b6b" font-size="13">🗑️  ESQUECIDO</text>
  <text x="342" y="392" text-anchor="middle" fill="#ff6b6b" font-size="10">Sem revisão em 24h:</text>
  <text x="342" y="407" text-anchor="middle" fill="#ff6b6b" font-size="10">66% perdido (Ebbinghaus)</text>

  <text x="342" y="442" text-anchor="middle" fill="#8a3030" font-size="9">Esforço sem resultado duradouro</text>

  <!-- ========================================= -->
  <!-- CONSOLIDATION PROCESSES (middle) -->
  <!-- ========================================= -->

  <!-- Arrow 2: Trabalho → Consolidação -->
  <line x1="442" y1="180" x2="490" y2="180" stroke="#27ae60" stroke-width="2.5"/>
  <polygon points="490,174 502,180 490,186" fill="#27ae60"/>

  <!-- Consolidation box -->
  <rect x="504" y="80" width="190" height="260" rx="10" fill="#0d2a15" stroke="#27ae60" stroke-width="2"/>
  <rect x="504" y="80" width="190" height="34" rx="10" fill="#1a4a25"/>
  <rect x="504" y="102" width="190" height="12" fill="#1a4a25"/>
  <text x="599" y="103" text-anchor="middle" fill="#58d68d" font-size="12" font-weight="bold">CONSOLIDAÇÃO</text>

  <text x="599" y="126" text-anchor="middle" fill="#82e0aa" font-size="10" font-weight="bold">✅ Retrieval Practice</text>
  <text x="599" y="140" text-anchor="middle" fill="#a9dfba" font-size="9">Fechar livro e recuperar</text>
  <text x="599" y="152" text-anchor="middle" fill="#a9dfba" font-size="9">sem ver o material</text>

  <line x1="524" y1="160" x2="674" y2="160" stroke="#27ae60" stroke-width="0.5" opacity="0.4"/>

  <text x="599" y="176" text-anchor="middle" fill="#82e0aa" font-size="10" font-weight="bold">✅ Revisão Espaçada</text>
  <text x="599" y="190" text-anchor="middle" fill="#a9dfba" font-size="9">24h → 1 sem → 1 mês</text>
  <text x="599" y="202" text-anchor="middle" fill="#a9dfba" font-size="9">(Ebbinghaus)</text>

  <line x1="524" y1="210" x2="674" y2="210" stroke="#27ae60" stroke-width="0.5" opacity="0.4"/>

  <text x="599" y="226" text-anchor="middle" fill="#82e0aa" font-size="10" font-weight="bold">✅ Elaboração</text>
  <text x="599" y="240" text-anchor="middle" fill="#a9dfba" font-size="9">Conectar ao conhecimento</text>
  <text x="599" y="252" text-anchor="middle" fill="#a9dfba" font-size="9">anterior (neurônio dendrítico)</text>

  <line x1="524" y1="260" x2="674" y2="260" stroke="#27ae60" stroke-width="0.5" opacity="0.4"/>

  <text x="599" y="276" text-anchor="middle" fill="#82e0aa" font-size="10" font-weight="bold">✅ Sono NREM Profundo</text>
  <text x="599" y="290" text-anchor="middle" fill="#a9dfba" font-size="9">Hipocampo → Córtex</text>
  <text x="599" y="302" text-anchor="middle" fill="#a9dfba" font-size="9">Consolidação noturna</text>
  <text x="599" y="316" text-anchor="middle" fill="#a9dfba" font-size="9">(Walker, UC Berkeley)</text>

  <line x1="524" y1="324" x2="674" y2="324" stroke="#27ae60" stroke-width="0.5" opacity="0.4"/>

  <text x="599" y="338" text-anchor="middle" fill="#82e0aa" font-size="10" font-weight="bold">✅ BDNF + Exercício</text>
  <text x="599" y="352" text-anchor="middle" fill="#a9dfba" font-size="9">Pico pós-exercício</text>

  <!-- Arrow 3: Consolidação → Longo Prazo -->
  <line x1="694" y1="210" x2="738" y2="210" stroke="#27ae60" stroke-width="2.5"/>
  <polygon points="738,204 750,210 738,216" fill="#27ae60"/>

  <!-- ========================================= -->
  <!-- BOX 3: MEMÓRIA DE LONGO PRAZO -->
  <!-- ========================================= -->
  <rect x="752" y="80" width="130" height="260" rx="10" fill="#0a1e12" stroke="#1e8449" stroke-width="2.5"/>
  <rect x="752" y="80" width="130" height="34" rx="10" fill="#145a32"/>
  <rect x="752" y="102" width="130" height="12" fill="#145a32"/>
  <text x="817" y="103" text-anchor="middle" fill="#52be80" font-size="11" font-weight="bold">MEMÓRIA DE</text>
  <text x="817" y="117" text-anchor="middle" fill="#52be80" font-size="11" font-weight="bold">LONGO PRAZO</text>

  <!-- LTM properties -->
  <text x="817" y="144" text-anchor="middle" fill="#82e0aa" font-size="10">♾️  Ilimitada</text>
  <text x="817" y="160" text-anchor="middle" fill="#a9dfba" font-size="9">Sem limite de</text>
  <text x="817" y="172" text-anchor="middle" fill="#a9dfba" font-size="9">armazenamento</text>

  <line x1="762" y1="182" x2="872" y2="182" stroke="#1e8449" stroke-width="0.5"/>

  <text x="817" y="198" text-anchor="middle" fill="#82e0aa" font-size="10">⏳  Anos ou décadas</text>
  <text x="817" y="212" text-anchor="middle" fill="#a9dfba" font-size="9">Com revisão</text>
  <text x="817" y="224" text-anchor="middle" fill="#a9dfba" font-size="9">adequada</text>

  <line x1="762" y1="234" x2="872" y2="234" stroke="#1e8449" stroke-width="0.5"/>

  <text x="817" y="250" text-anchor="middle" fill="#82e0aa" font-size="10">🧠  Base de Chunks</text>
  <text x="817" y="264" text-anchor="middle" fill="#a9dfba" font-size="9">Quanto mais</text>
  <text x="817" y="278" text-anchor="middle" fill="#a9dfba" font-size="9">chunks, mais</text>
  <text x="817" y="290" text-anchor="middle" fill="#a9dfba" font-size="9">fácil aprender</text>

  <line x1="762" y1="300" x2="872" y2="300" stroke="#1e8449" stroke-width="0.5"/>

  <text x="817" y="316" text-anchor="middle" fill="#82e0aa" font-size="10">⚡  LTP Tardio</text>
  <text x="817" y="330" text-anchor="middle" fill="#a9dfba" font-size="9">Estrutura sináptica</text>
  <text x="817" y="342" text-anchor="middle" fill="#a9dfba" font-size="9">modificada</text>

  <!-- ========================================= -->
  <!-- BOTTOM: NOTES AND WARNINGS -->
  <!-- ========================================= -->

  <!-- Warning box: O que impede a consolidação -->
  <rect x="20" y="460" width="440" height="100" rx="8" fill="#1a0808" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="240" y="482" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="bold">❌  O Que Impede a Consolidação</text>
  <text x="40" y="502" fill="#f0a0a0" font-size="11">• Releitura passiva (sem esforço de recuperação)</text>
  <text x="40" y="520" fill="#f0a0a0" font-size="11">• Privação de sono (Walker: -40% em uma noite)</text>
  <text x="40" y="538" fill="#f0a0a0" font-size="11">• Distrações durante estudo (interrompe LTP)</text>
  <text x="40" y="555" fill="#f0a0a0" font-size="11">• Maratona sem espaçamento (massed practice)</text>

  <!-- Key insight box -->
  <rect x="480" y="460" width="400" height="100" rx="8" fill="#0a1e12" stroke="#27ae60" stroke-width="1.5"/>
  <text x="680" y="482" text-anchor="middle" fill="#52be80" font-size="12" font-weight="bold">✅  Fórmula da Consolidação</text>
  <text x="500" y="502" fill="#a9dfba" font-size="11">• Retrieval: fechar e recuperar antes de rever</text>
  <text x="500" y="520" fill="#a9dfba" font-size="11">• Espaçar: 24h → 1 semana → 1 mês → 6 meses</text>
  <text x="500" y="538" fill="#a9dfba" font-size="11">• Elaborar: conectar ao que já sabe (dendritos)</text>
  <text x="500" y="555" fill="#a9dfba" font-size="11">• Dormir: NREM profundo consolida memória declarativa</text>

</svg>
