<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="560" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="560" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e0e0e0" font-size="20" font-weight="bold">Os Dois Modos do Cérebro</text>
  <text x="450" y="62" text-anchor="middle" fill="#a0a0b0" font-size="13">Barbara Oakley — Oakland University | Default Mode Network (DMN)</text>

  <!-- ========================================= -->
  <!-- LEFT PANEL: MODO FOCADO -->
  <!-- ========================================= -->
  <rect x="30" y="82" width="360" height="390" fill="#0d1b3e" rx="12" stroke="#3a6fd8" stroke-width="2"/>

  <!-- Focused mode title -->
  <rect x="30" y="82" width="360" height="48" fill="#1e3a6e" rx="12"/>
  <rect x="30" y="118" width="360" height="12" fill="#1e3a6e"/>
  <text x="210" y="113" text-anchor="middle" fill="#7aaeff" font-size="17" font-weight="bold">MODO FOCADO</text>

  <!-- Laser/spotlight icon -->
  <polygon points="210,150 190,200 230,200" fill="#3a6fd8" opacity="0.4"/>
  <circle cx="210" cy="145" r="14" fill="#3a6fd8" stroke="#7aaeff" stroke-width="2"/>
  <line x1="210" y1="131" x2="210" y2="122" stroke="#7aaeff" stroke-width="2"/>
  <line x1="221" y1="134" x2="228" y2="127" stroke="#7aaeff" stroke-width="2"/>
  <line x1="199" y1="134" x2="192" y2="127" stroke="#7aaeff" stroke-width="2"/>
  <!-- Laser beam -->
  <line x1="210" y1="159" x2="170" y2="215" stroke="#7aaeff" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.7"/>
  <line x1="210" y1="159" x2="250" y2="215" stroke="#7aaeff" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.7"/>
  <!-- Focus dot -->
  <ellipse cx="210" cy="218" rx="40" ry="8" fill="#7aaeff" fill-opacity="0.15"/>
  <circle cx="210" cy="214" r="5" fill="#7aaeff"/>

  <!-- Focused characteristics -->
  <rect x="52" y="240" width="316" height="32" fill="#162d5c" rx="6"/>
  <text x="70" y="261" fill="#e0e0e0" font-size="13">🎯  Atenção dirigida e linear</text>

  <rect x="52" y="280" width="316" height="32" fill="#162d5c" rx="6"/>
  <text x="70" y="301" fill="#e0e0e0" font-size="13">🧩  Padrões de pensamento conhecidos</text>

  <rect x="52" y="320" width="316" height="32" fill="#162d5c" rx="6"/>
  <text x="70" y="341" fill="#e0e0e0" font-size="13">⚡  Córtex pré-frontal ativo</text>

  <rect x="52" y="360" width="316" height="32" fill="#162d5c" rx="6"/>
  <text x="70" y="381" fill="#e0e0e0" font-size="13">📚  Ideal para revisar e exercitar</text>

  <!-- Use case label -->
  <rect x="52" y="410" width="316" height="50" fill="#0a2050" rx="6" stroke="#3a6fd8" stroke-width="1"/>
  <text x="210" y="429" text-anchor="middle" fill="#7aaeff" font-size="11" font-weight="bold">ANALOGIA: LANTERNA</text>
  <text x="210" y="448" text-anchor="middle" fill="#a0c0f0" font-size="11">Luz intensa e estreita em um ponto só</text>

  <!-- ========================================= -->
  <!-- CENTER: ALTERNÂNCIA DELIBERADA -->
  <!-- ========================================= -->

  <!-- Center circle -->
  <circle cx="450" cy="280" r="52" fill="#2a1a3e" stroke="#9b59b6" stroke-width="2"/>
  <text x="450" y="268" text-anchor="middle" fill="#c39bd3" font-size="11" font-weight="bold">ALTERNÂNCIA</text>
  <text x="450" y="284" text-anchor="middle" fill="#c39bd3" font-size="11" font-weight="bold">DELIBERADA</text>
  <text x="450" y="300" text-anchor="middle" fill="#9b59b6" font-size="11">Pomodoro</text>
  <text x="450" y="316" text-anchor="middle" fill="#9b59b6" font-size="11">25min / 5min</text>

  <!-- Arrows -->
  <!-- Left arrow (focado → centro) -->
  <path d="M 395,268 L 405,276 L 395,284" fill="none" stroke="#7aaeff" stroke-width="2.5" stroke-linejoin="round"/>
  <line x1="395" y1="276" x2="392" y2="276" stroke="#7aaeff" stroke-width="2.5"/>

  <!-- Right arrow (difuso → centro) -->
  <path d="M 505,268 L 495,276 L 505,284" fill="none" stroke="#ff9f43" stroke-width="2.5" stroke-linejoin="round"/>
  <line x1="505" y1="276" x2="508" y2="276" stroke="#ff9f43" stroke-width="2.5"/>

  <!-- Double arrow labels -->
  <text x="450" y="245" text-anchor="middle" fill="#c39bd3" font-size="10">⟵ Focado</text>
  <text x="450" y="258" text-anchor="middle" fill="#c39bd3" font-size="10">Difuso ⟶</text>

  <!-- ========================================= -->
  <!-- RIGHT PANEL: MODO DIFUSO -->
  <!-- ========================================= -->
  <rect x="510" y="82" width="360" height="390" fill="#1a0e28" rx="12" stroke="#e07b39" stroke-width="2"/>

  <!-- Diffuse mode title -->
  <rect x="510" y="82" width="360" height="48" fill="#2d1a10" rx="12"/>
  <rect x="510" y="118" width="360" height="12" fill="#2d1a10"/>
  <text x="690" y="113" text-anchor="middle" fill="#ff9f43" font-size="17" font-weight="bold">MODO DIFUSO</text>

  <!-- Network/web icon -->
  <circle cx="690" cy="155" r="6" fill="#e07b39" stroke="#ff9f43" stroke-width="1.5"/>
  <circle cx="660" cy="175" r="5" fill="#e07b39" stroke="#ff9f43" stroke-width="1.5"/>
  <circle cx="720" cy="175" r="5" fill="#e07b39" stroke="#ff9f43" stroke-width="1.5"/>
  <circle cx="648" cy="200" r="4" fill="#ff9f43" opacity="0.7"/>
  <circle cx="690" cy="205" r="4" fill="#ff9f43" opacity="0.7"/>
  <circle cx="732" cy="200" r="4" fill="#ff9f43" opacity="0.7"/>
  <circle cx="670" cy="220" r="3" fill="#ff9f43" opacity="0.5"/>
  <circle cx="710" cy="220" r="3" fill="#ff9f43" opacity="0.5"/>
  <!-- Network connections -->
  <line x1="690" y1="155" x2="660" y2="175" stroke="#ff9f43" stroke-width="1.5" opacity="0.6"/>
  <line x1="690" y1="155" x2="720" y2="175" stroke="#ff9f43" stroke-width="1.5" opacity="0.6"/>
  <line x1="660" y1="175" x2="720" y2="175" stroke="#ff9f43" stroke-width="1" opacity="0.4"/>
  <line x1="660" y1="175" x2="648" y2="200" stroke="#ff9f43" stroke-width="1" opacity="0.5"/>
  <line x1="660" y1="175" x2="690" y2="205" stroke="#ff9f43" stroke-width="1" opacity="0.5"/>
  <line x1="720" y1="175" x2="732" y2="200" stroke="#ff9f43" stroke-width="1" opacity="0.5"/>
  <line x1="720" y1="175" x2="690" y2="205" stroke="#ff9f43" stroke-width="1" opacity="0.5"/>
  <line x1="648" y1="200" x2="670" y2="220" stroke="#ff9f43" stroke-width="1" opacity="0.4"/>
  <line x1="690" y1="205" x2="670" y2="220" stroke="#ff9f43" stroke-width="1" opacity="0.4"/>
  <line x1="690" y1="205" x2="710" y2="220" stroke="#ff9f43" stroke-width="1" opacity="0.4"/>
  <line x1="732" y1="200" x2="710" y2="220" stroke="#ff9f43" stroke-width="1" opacity="0.4"/>

  <!-- Diffuse characteristics -->
  <rect x="532" y="240" width="316" height="32" fill="#2a1508" rx="6"/>
  <text x="550" y="261" fill="#e0e0e0" font-size="13">🌐  Default Mode Network ativa</text>

  <rect x="532" y="280" width="316" height="32" fill="#2a1508" rx="6"/>
  <text x="550" y="301" fill="#e0e0e0" font-size="13">💡  Insights e conexões criativas</text>

  <rect x="532" y="320" width="316" height="32" fill="#2a1508" rx="6"/>
  <text x="550" y="341" fill="#e0e0e0" font-size="13">🔄  Consolidação da memória</text>

  <rect x="532" y="360" width="316" height="32" fill="#2a1508" rx="6"/>
  <text x="550" y="381" fill="#e0e0e0" font-size="13">🚶  Ativo durante: banho, caminhada</text>

  <!-- Use case label -->
  <rect x="532" y="410" width="316" height="50" fill="#1a0804" rx="6" stroke="#e07b39" stroke-width="1"/>
  <text x="690" y="429" text-anchor="middle" fill="#ff9f43" font-size="11" font-weight="bold">ANALOGIA: HOLOFOTE DIFUSO</text>
  <text x="690" y="448" text-anchor="middle" fill="#f0c090" font-size="11">Luz suave e espalhada em toda a área</text>

  <!-- ========================================= -->
  <!-- BOTTOM: EXAMPLES -->
  <!-- ========================================= -->
  <rect x="30" y="484" width="840" height="62" fill="#12122a" rx="10" stroke="#2a2a4a" stroke-width="1"/>

  <text x="450" y="506" text-anchor="middle" fill="#c0c0d0" font-size="12" font-weight="bold">Exemplos Históricos do Modo Difuso</text>

  <text x="80"  y="528" fill="#ff9f43" font-size="11">⚗️ Arquimedes</text>
  <text x="80"  y="542" fill="#a0a0b0" font-size="10">Eureka na banheira</text>

  <text x="230" y="528" fill="#ff9f43" font-size="11">💡 Thomas Edison</text>
  <text x="230" y="542" fill="#a0a0b0" font-size="10">Esferas + hipnagogia</text>

  <text x="390" y="528" fill="#ff9f43" font-size="11">🎨 Salvador Dalí</text>
  <text x="390" y="542" fill="#a0a0b0" font-size="10">Colher + cadeira</text>

  <text x="545" y="528" fill="#ff9f43" font-size="11">🎵 Paul McCartney</text>
  <text x="545" y="542" fill="#a0a0b0" font-size="10">Yesterday (sonho)</text>

  <text x="705" y="528" fill="#ff9f43" font-size="11">🍎 Isaac Newton</text>
  <text x="705" y="542" fill="#a0a0b0" font-size="10">Gravitação (jardim)</text>

</svg>
