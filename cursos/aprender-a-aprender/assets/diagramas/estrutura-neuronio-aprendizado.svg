<?xml version="1.0" encoding="UTF-8"?>
<svg width="860" height="500" viewBox="0 0 860 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">

  <!-- Background -->
  <rect width="860" height="500" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="bold">Estrutura do Neuronio e o Aprendizado</text>
  <text x="430" y="52" text-anchor="middle" fill="#a0a0b0" font-size="11">Base da Neuroplasticidade — Como a informacao flui na celula nervosa</text>

  <!-- ===== DENDRITES (left area) ===== -->
  <!-- Dendrite 1 — top -->
  <line x1="200" y1="235" x2="300" y2="260" stroke="#00d4ff" stroke-width="4" stroke-linecap="round"/>
  <line x1="140" y1="198" x2="202" y2="236" stroke="#00d4ff" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="100" y1="165" x2="142" y2="200" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
  <circle cx="98" cy="163" r="5" fill="#00d4ff" opacity="0.7"/>

  <!-- Dendrite 2 — center -->
  <line x1="190" y1="275" x2="300" y2="278" stroke="#00d4ff" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="278" x2="192" y2="276" stroke="#00d4ff" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="76" y1="265" x2="122" y2="278" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
  <circle cx="74" cy="265" r="5" fill="#00d4ff" opacity="0.7"/>

  <!-- Dendrite 3 — bottom -->
  <line x1="205" y1="315" x2="300" y2="296" stroke="#00d4ff" stroke-width="4" stroke-linecap="round"/>
  <line x1="148" y1="345" x2="207" y2="317" stroke="#00d4ff" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="106" y1="375" x2="150" y2="347" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
  <circle cx="104" cy="377" r="5" fill="#00d4ff" opacity="0.7"/>

  <!-- Dendrite label box -->
  <rect x="30" y="255" width="80" height="30" fill="#0d2040" rx="6" stroke="#00d4ff" stroke-width="1"/>
  <text x="70" y="275" text-anchor="middle" fill="#00d4ff" font-size="11" font-weight="bold">Dendritos</text>

  <!-- Input label box -->
  <rect x="30" y="130" width="190" height="46" fill="#0a1a30" rx="6" stroke="#00a0c0" stroke-width="1"/>
  <text x="125" y="150" text-anchor="middle" fill="#80d0e0" font-size="11" font-weight="bold">Estimulos /</text>
  <text x="125" y="168" text-anchor="middle" fill="#80d0e0" font-size="11" font-weight="bold">Informacao Nova</text>
  <line x1="125" y1="176" x2="125" y2="205" stroke="#00a0c0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="121,205 125,215 129,205" fill="#00a0c0"/>

  <!-- ===== CELL BODY (Soma) ===== -->
  <circle cx="378" cy="278" r="70" fill="#0d2040" stroke="#00d4ff" stroke-width="3"/>
  <circle cx="378" cy="278" r="36" fill="#1a3a5a" stroke="#4090c0" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="378" cy="278" r="18" fill="#2a5a7a" stroke="#70b0d0" stroke-width="1.5"/>
  <text x="378" y="275" text-anchor="middle" fill="#a0d0e0" font-size="11" font-weight="bold">Nucleo</text>
  <text x="378" y="290" text-anchor="middle" fill="#70a0b0" font-size="10">(DNA)</text>

  <!-- Soma label -->
  <text x="378" y="365" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="bold">Corpo Celular</text>
  <text x="378" y="381" text-anchor="middle" fill="#70b0c0" font-size="11">(Soma)</text>

  <!-- ===== AXON (right) ===== -->
  <line x1="448" y1="278" x2="498" y2="278" stroke="#26de81" stroke-width="6" stroke-linecap="round"/>

  <!-- Myelin sheaths -->
  <rect x="498" y="268" width="52" height="20" rx="9" fill="#1a4a2a" stroke="#26de81" stroke-width="2"/>
  <line x1="550" y1="278" x2="563" y2="278" stroke="#26de81" stroke-width="4"/>
  <rect x="563" y="268" width="52" height="20" rx="9" fill="#1a4a2a" stroke="#26de81" stroke-width="2"/>
  <line x1="615" y1="278" x2="628" y2="278" stroke="#26de81" stroke-width="4"/>
  <rect x="628" y="268" width="52" height="20" rx="9" fill="#1a4a2a" stroke="#26de81" stroke-width="2"/>
  <line x1="680" y1="278" x2="706" y2="278" stroke="#26de81" stroke-width="4"/>

  <!-- Axon label -->
  <text x="600" y="244" text-anchor="middle" fill="#26de81" font-size="11" font-weight="bold">Axonio</text>
  <line x1="600" y1="248" x2="600" y2="268" stroke="#26de81" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Myelin label box -->
  <rect x="488" y="302" width="200" height="36" fill="#0a2a1a" rx="6" stroke="#26de81" stroke-width="1"/>
  <text x="588" y="320" text-anchor="middle" fill="#50c870" font-size="11" font-weight="bold">Mielina — velocidade</text>
  <text x="588" y="334" text-anchor="middle" fill="#408850" font-size="10">acelera a transmissao</text>

  <!-- Transmission arrow -->
  <text x="634" y="218" text-anchor="middle" fill="#80d0b0" font-size="11">Transmissao</text>
  <polygon points="700,222 710,218 700,214" fill="#26de81"/>
  <line x1="660" y1="218" x2="708" y2="218" stroke="#26de81" stroke-width="2"/>

  <!-- ===== SYNAPTIC TERMINAL ===== -->
  <circle cx="724" cy="260" r="9" fill="#ff9f43" stroke="#ffcf93" stroke-width="2"/>
  <circle cx="724" cy="278" r="11" fill="#ff9f43" stroke="#ffcf93" stroke-width="2"/>
  <circle cx="724" cy="298" r="9" fill="#ff9f43" stroke="#ffcf93" stroke-width="2"/>
  <line x1="706" y1="278" x2="713" y2="260" stroke="#26de81" stroke-width="2"/>
  <line x1="706" y1="278" x2="713" y2="278" stroke="#26de81" stroke-width="2"/>
  <line x1="706" y1="278" x2="713" y2="298" stroke="#26de81" stroke-width="2"/>

  <!-- Synapse label box -->
  <rect x="736" y="254" width="100" height="52" fill="#2a1800" rx="6" stroke="#ff9f43" stroke-width="1.5"/>
  <text x="786" y="274" text-anchor="middle" fill="#ff9f43" font-size="12" font-weight="bold">Sinapse</text>
  <text x="786" y="290" text-anchor="middle" fill="#c07030" font-size="10">Conexao entre</text>
  <text x="786" y="304" text-anchor="middle" fill="#c07030" font-size="10">neuronios</text>

  <!-- ===== BOTTOM NOTE ===== -->
  <rect x="30" y="415" width="480" height="60" fill="#12122a" rx="8" stroke="#2a2a4a" stroke-width="1"/>
  <text x="270" y="437" text-anchor="middle" fill="#ffd700" font-size="12" font-weight="bold">Neuronio Dendritico — Prof. Pierluigi Piazzi</text>
  <text x="270" y="455" text-anchor="middle" fill="#a0a0b0" font-size="10">Mais dendritos = mais conexoes = menor esquecimento</text>
  <text x="270" y="470" text-anchor="middle" fill="#7070a0" font-size="10">Revisao ativa cria dendritos. Releitura passiva, nao.</text>

  <!-- LTP note box -->
  <rect x="522" y="415" width="308" height="60" fill="#0a2a1a" rx="8" stroke="#26de81" stroke-width="1"/>
  <text x="676" y="437" text-anchor="middle" fill="#26de81" font-size="12" font-weight="bold">LTP — Long-Term Potentiation</text>
  <text x="676" y="455" text-anchor="middle" fill="#70c090" font-size="10">"Neuronios que disparam juntos,</text>
  <text x="676" y="470" text-anchor="middle" fill="#70c090" font-size="10">conectam-se juntos." — Hebb</text>

</svg>
