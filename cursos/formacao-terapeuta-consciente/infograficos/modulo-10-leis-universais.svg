<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f2e"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <radialGradient id="centerRad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0f0f2e;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="600" fill="url(#bgGrad)"/>

  <!-- Stars -->
  <circle cx="30" cy="40" r="1" fill="white" opacity="0.5"/>
  <circle cx="870" cy="60" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="50" cy="520" r="1" fill="white" opacity="0.3"/>
  <circle cx="860" cy="530" r="1" fill="white" opacity="0.4"/>
  <circle cx="400" cy="12" r="1" fill="white" opacity="0.5"/>
  <circle cx="750" cy="580" r="1" fill="white" opacity="0.3"/>

  <!-- Header -->
  <rect x="0" y="0" width="900" height="72" fill="#0d0d28" opacity="0.9"/>
  <rect x="0" y="70" width="900" height="2" fill="#fbbf24" opacity="0.6"/>
  <text x="30" y="30" font-family="Arial, sans-serif" font-size="11" fill="#fbbf24" opacity="0.8" letter-spacing="2">MÓDULO 10</text>
  <text x="30" y="56" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#f0c060" filter="url(#glow)" letter-spacing="1">Leis Universais — O Kybalion e a Sabedoria Hermética</text>
  <text x="870" y="42" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">4 Aulas · 90 min</text>

  <!-- CENTER: Heptagon with 7 Hermetic Laws -->
  <!-- Center: 450, 310 -->
  <!-- Heptagon vertices r=170: angles = 90°, 90+51.4°, 90+102.8°... -->
  <!-- 7 points evenly: 360/7 ≈ 51.43° -->
  <!-- v1: 90° = 450, 140 -->
  <!-- v2: 141.4° = 450-107, 310-106 = 343, 204 -->
  <!-- v3: 192.9° = 450-166, 310+37 = 284, 347 -->
  <!-- v4: 244.3° = 450-107, 310+154 = 343, 464 but capped -->
  <!-- Let's use smaller radius=155 to fit -->
  <!-- v1: 90° → 450, 310-155=155 → 450,155 -->
  <!-- v2: 141.4° → 450+155*cos(141.4°)=450-121=329, 310-155*sin(141.4°)=310-97=213 -->
  <!-- wait: cos(141.4°)=-0.781, sin(141.4°)=0.625 → 450-121=329, 310-97=213 -->
  <!-- v3: 192.9° → cos=-0.974, sin=0.225 → 450-151=299, 310-35=275 -->
  <!-- v4: 244.3° → cos=-0.435, sin=-0.900 → 450-67=383, 310+139=449 -->
  <!-- v5: 295.7° → cos=0.435, sin=-0.900 → 450+67=517, 310+139=449 -->
  <!-- v6: 347.1° → cos=0.974, sin=0.225 → 450+151=601, 310-35=275 -->
  <!-- v7: 398.6° (=38.6°) → cos=0.781, sin=0.625 → 450+121=571, 310-97=213 -->

  <!-- Outer decorative ring -->
  <circle cx="450" cy="310" r="178" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.25"/>
  <circle cx="450" cy="310" r="185" fill="none" stroke="#f0c060" stroke-width="0.3" opacity="0.15" stroke-dasharray="6,5"/>

  <!-- Heptagon outline -->
  <polygon points="450,155 329,213 299,347 383,449 517,449 601,347 571,213" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>

  <!-- Center radial glow -->
  <circle cx="450" cy="310" r="150" fill="url(#centerRad)"/>

  <!-- Center label - The Kybalion -->
  <circle cx="450" cy="310" r="58" fill="#1e1e4e" stroke="#f0c060" stroke-width="2" filter="url(#softGlow)"/>
  <circle cx="450" cy="310" r="46" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="450" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#f0c060" font-weight="bold" filter="url(#glow)">O KYBALION</text>
  <text x="450" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#fde68a">"Três Iniciados"</text>
  <text x="450" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Hermes Trismegisto</text>

  <!-- Lines from center to each law node -->
  <line x1="450" y1="252" x2="450" y2="175" stroke="#a78bfa" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="415" y1="280" x2="337" y2="225" stroke="#a78bfa" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="403" y1="318" x2="317" y2="342" stroke="#a78bfa" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="415" y1="350" x2="395" y2="429" stroke="#a78bfa" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="485" y1="350" x2="505" y2="429" stroke="#a78bfa" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="497" y1="318" x2="583" y2="342" stroke="#a78bfa" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="485" y1="280" x2="563" y2="225" stroke="#a78bfa" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>

  <!-- 7 Law nodes -->
  <!-- 1: Mentalismo (top) = 450, 155 -->
  <circle cx="450" cy="155" r="38" fill="#2d1b4e" stroke="#f0c060" stroke-width="2" filter="url(#glow)"/>
  <text x="450" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#f0c060">🧠</text>
  <text x="450" y="159" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#fde68a" font-weight="bold">MENTALISMO</text>
  <text x="450" y="171" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#94a3b8">"Tudo é Mente"</text>
  <text x="450" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">I. Lei</text>

  <!-- 2: Correspondência (upper-left) = 329, 213 -->
  <circle cx="329" cy="213" r="38" fill="#1a1a3e" stroke="#60a5fa" stroke-width="2" filter="url(#glow)"/>
  <text x="329" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#60a5fa">🔺</text>
  <text x="329" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#bfdbfe" font-weight="bold">CORRESPON-</text>
  <text x="329" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#bfdbfe" font-weight="bold">DÊNCIA</text>
  <text x="329" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">II. Lei</text>

  <!-- 3: Vibração (left) = 299, 347 -->
  <circle cx="299" cy="347" r="38" fill="#1a1a3e" stroke="#34d399" stroke-width="2" filter="url(#glow)"/>
  <text x="299" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#34d399">〰</text>
  <text x="299" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#6ee7b7" font-weight="bold">VIBRAÇÃO</text>
  <text x="299" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#94a3b8">"Tudo vibra"</text>
  <text x="299" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">III. Lei</text>

  <!-- 4: Polaridade (lower-left) = 383, 449 -->
  <circle cx="383" cy="449" r="38" fill="#1a1a3e" stroke="#f472b6" stroke-width="2" filter="url(#glow)"/>
  <text x="383" y="437" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#f472b6">⊕</text>
  <text x="383" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#fbcfe8" font-weight="bold">POLARIDADE</text>
  <text x="383" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#94a3b8">"Opostos iguais"</text>
  <text x="383" y="477" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">IV. Lei</text>

  <!-- 5: Ritmo (lower-right) = 517, 449 -->
  <circle cx="517" cy="449" r="38" fill="#1a1a3e" stroke="#fbbf24" stroke-width="2" filter="url(#glow)"/>
  <text x="517" y="437" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fbbf24">♾</text>
  <text x="517" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#fde68a" font-weight="bold">RITMO</text>
  <text x="517" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#94a3b8">"Fluxo e refluxo"</text>
  <text x="517" y="477" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">V. Lei</text>

  <!-- 6: Causa-Efeito (right) = 601, 347 -->
  <circle cx="601" cy="347" r="38" fill="#1a1a3e" stroke="#a78bfa" stroke-width="2" filter="url(#glow)"/>
  <text x="601" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a78bfa">⚖</text>
  <text x="601" y="351" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e9d5ff" font-weight="bold">CAUSA-EFEITO</text>
  <text x="601" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#94a3b8">"Nada é acaso"</text>
  <text x="601" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">VI. Lei</text>

  <!-- 7: Gênero (upper-right) = 571, 213 -->
  <circle cx="571" cy="213" r="38" fill="#1a1a3e" stroke="#f0c060" stroke-width="2" filter="url(#glow)"/>
  <text x="571" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#f0c060">☯</text>
  <text x="571" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#fde68a" font-weight="bold">GÊNERO</text>
  <text x="571" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#94a3b8">"Gera e cria"</text>
  <text x="571" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">VII. Lei</text>

  <!-- LEFT outside panel: Consciousness scale -->
  <rect x="18" y="82" width="195" height="440" rx="12" fill="#1e1e4e" stroke="#f0c060" stroke-width="1" opacity="0.9"/>
  <text x="115" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#f0c060" letter-spacing="0.5">ESCALA DE</text>
  <text x="115" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#f0c060">CONSCIÊNCIA</text>

  <!-- Scale bars -->
  <rect x="28" y="130" width="24" height="370" rx="4" fill="#1a1a3e" stroke="#94a3b8" stroke-width="0.8"/>
  <!-- Level fills -->
  <rect x="29" y="440" width="22" height="59" rx="3" fill="#f87171" opacity="0.8"/>
  <rect x="29" y="400" width="22" height="38" rx="3" fill="#f97316" opacity="0.8"/>
  <rect x="29" y="355" width="22" height="44" rx="3" fill="#fbbf24" opacity="0.8"/>
  <rect x="29" y="315" width="22" height="38" rx="3" fill="#84cc16" opacity="0.8"/>
  <rect x="29" y="270" width="22" height="44" rx="3" fill="#34d399" opacity="0.8" filter="url(#glow)"/>
  <rect x="29" y="220" width="22" height="48" rx="3" fill="#60a5fa" opacity="0.8" filter="url(#glow)"/>
  <rect x="29" y="170" width="22" height="48" rx="3" fill="#a78bfa" opacity="0.9" filter="url(#glow)"/>
  <rect x="29" y="130" width="22" height="38" rx="3" fill="#f0c060" opacity="0.9" filter="url(#strongGlow)"/>

  <!-- Scale labels -->
  <text x="60" y="152" font-family="Arial, sans-serif" font-size="8.5" fill="#f0c060" font-weight="bold">700+ Iluminação</text>
  <text x="60" y="198" font-family="Arial, sans-serif" font-size="8.5" fill="#a78bfa" font-weight="bold">600  Paz profunda</text>
  <text x="60" y="248" font-family="Arial, sans-serif" font-size="8.5" fill="#60a5fa" font-weight="bold">540  Alegria/Amor</text>
  <text x="60" y="296" font-family="Arial, sans-serif" font-size="8.5" fill="#34d399" font-weight="bold">500  Amor</text>
  <text x="60" y="337" font-family="Arial, sans-serif" font-size="8.5" fill="#84cc16" font-weight="bold">400  Razão</text>
  <text x="60" y="378" font-family="Arial, sans-serif" font-size="8.5" fill="#fbbf24" font-weight="bold">310  Disposição</text>
  <text x="60" y="422" font-family="Arial, sans-serif" font-size="8.5" fill="#f97316" font-weight="bold">150  Raiva/Medo</text>
  <text x="60" y="468" font-family="Arial, sans-serif" font-size="8.5" fill="#f87171" font-weight="bold">20   Vergonha</text>

  <!-- Dividing line -->
  <line x1="28" y1="323" x2="52" y2="323" stroke="#f0c060" stroke-width="2" opacity="0.7"/>
  <text x="57" y="319" font-family="Arial, sans-serif" font-size="7" fill="#f0c060">cura</text>
  <text x="57" y="329" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">aprendiz.</text>

  <!-- Upward arrow -->
  <polygon points="40,126 35,136 45,136" fill="#f0c060" filter="url(#glow)"/>
  <text x="115" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#94a3b8">Hawkins · Power vs Force</text>

  <!-- RIGHT outside panel: How to apply -->
  <rect x="687" y="82" width="195" height="440" rx="12" fill="#1e1e4e" stroke="#34d399" stroke-width="1" opacity="0.9"/>
  <text x="784" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#34d399" letter-spacing="0.5">APLICAÇÃO</text>
  <text x="784" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#34d399">TERAPÊUTICA</text>

  <rect x="697" y="130" width="175" height="370" rx="6" fill="#0f0f2e" stroke="#34d399" stroke-width="0.8"/>
  <text x="697" y="152" font-family="Arial, sans-serif" font-size="8.5" fill="#f0c060" font-weight="bold">  I.   Mentalismo</text>
  <text x="700" y="165" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  Mente cria realidade. Use</text>
  <text x="700" y="177" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  pensamento para curar.</text>
  <text x="697" y="196" font-family="Arial, sans-serif" font-size="8.5" fill="#60a5fa" font-weight="bold">  II.  Correspondência</text>
  <text x="700" y="209" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  Interior = exterior. Mude</text>
  <text x="700" y="221" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  dentro, muda fora.</text>
  <text x="697" y="240" font-family="Arial, sans-serif" font-size="8.5" fill="#34d399" font-weight="bold">  III. Vibração</text>
  <text x="700" y="253" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  Eleve vibração do campo</text>
  <text x="700" y="265" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  durante o atendimento.</text>
  <text x="697" y="284" font-family="Arial, sans-serif" font-size="8.5" fill="#f472b6" font-weight="bold">  IV.  Polaridade</text>
  <text x="700" y="297" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  Toda dor tem amor. Mude</text>
  <text x="700" y="309" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  o polo da experiência.</text>
  <text x="697" y="328" font-family="Arial, sans-serif" font-size="8.5" fill="#fbbf24" font-weight="bold">  V.   Ritmo</text>
  <text x="700" y="341" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  Respeitar o processo do</text>
  <text x="700" y="353" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  cliente. Há tempo para tudo.</text>
  <text x="697" y="372" font-family="Arial, sans-serif" font-size="8.5" fill="#a78bfa" font-weight="bold">  VI.  Causa-Efeito</text>
  <text x="700" y="385" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  Identificar raiz do padrão.</text>
  <text x="700" y="397" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  Cortar causa = cura efeito.</text>
  <text x="697" y="416" font-family="Arial, sans-serif" font-size="8.5" fill="#f0c060" font-weight="bold">  VII. Gênero</text>
  <text x="700" y="429" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  Equilibrar energia Yin-Yang</text>
  <text x="700" y="441" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  no campo do assistido.</text>

  <text x="784" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" font-style="italic">Kybalion · Hermes Trismegisto</text>
  <text x="784" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" font-style="italic">"Como é em cima, é embaixo."</text>

  <!-- Footer -->
  <rect x="0" y="545" width="900" height="55" fill="#0d0d28" opacity="0.85"/>
  <line x1="0" y1="545" x2="900" y2="545" stroke="#fbbf24" stroke-width="1" opacity="0.4"/>
  <text x="450" y="566" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Módulo 10 · Terapeuta Consciente · Educa com Talento</text>
  <text x="450" y="582" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#fbbf24" font-style="italic">"Conhecer as Leis do Universo é ter o mapa completo da existência."</text>
</svg>
