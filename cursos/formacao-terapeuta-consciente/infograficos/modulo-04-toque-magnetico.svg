<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f2e"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="energyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="50%" style="stop-color:#f0c060"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="handGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="600" fill="url(#bgGrad)"/>

  <!-- Stars -->
  <circle cx="30" cy="60" r="1" fill="white" opacity="0.5"/>
  <circle cx="850" cy="40" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="60" cy="500" r="1" fill="white" opacity="0.3"/>
  <circle cx="870" cy="520" r="1" fill="white" opacity="0.4"/>
  <circle cx="400" cy="20" r="1" fill="white" opacity="0.5"/>

  <!-- Header -->
  <rect x="0" y="0" width="900" height="72" fill="#0d0d28" opacity="0.9"/>
  <rect x="0" y="70" width="900" height="2" fill="#f472b6" opacity="0.5"/>
  <text x="30" y="30" font-family="Arial, sans-serif" font-size="11" fill="#f472b6" opacity="0.8" letter-spacing="2">MÓDULO 04</text>
  <text x="30" y="56" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#f0c060" filter="url(#glow)" letter-spacing="1">Toque Magnético — A Energia pelas Mãos</text>
  <text x="870" y="42" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">4 Aulas · 90 min</text>

  <!-- MAIN CENTER: Therapist and Client -->
  <rect x="230" y="82" width="440" height="340" rx="14" fill="#1e1e4e" stroke="#f472b6" stroke-width="1.5" opacity="0.9"/>
  <text x="450" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f472b6" letter-spacing="1">FLUXO DE ENERGIA TERAPÊUTICA</text>

  <!-- THERAPIST (left figure) -->
  <circle cx="310" cy="195" r="26" fill="#1a1a3e" stroke="#f472b6" stroke-width="1.5"/>
  <text x="310" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#f472b6">👤</text>
  <rect x="295" y="222" width="30" height="65" rx="6" fill="#1a1a3e" stroke="#f472b6" stroke-width="1"/>
  <!-- Therapist arms reaching -->
  <line x1="295" y1="240" x2="262" y2="270" stroke="#f472b6" stroke-width="4" stroke-linecap="round"/>
  <line x1="325" y1="240" x2="370" y2="255" stroke="#f472b6" stroke-width="5" stroke-linecap="round"/>
  <!-- Right hand extended -->
  <ellipse cx="380" cy="258" rx="14" ry="9" fill="#f472b6" opacity="0.9" filter="url(#handGlow)"/>
  <text x="310" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#f472b6" font-weight="bold">TERAPEUTA</text>
  <!-- Therapist legs -->
  <line x1="302" y1="287" x2="295" y2="330" stroke="#f472b6" stroke-width="3" stroke-linecap="round"/>
  <line x1="318" y1="287" x2="325" y2="330" stroke="#f472b6" stroke-width="3" stroke-linecap="round"/>

  <!-- Energy flow lines between hands -->
  <path d="M394,255 Q420,240 440,250 Q460,260 480,250 Q500,240 520,248" stroke="url(#energyGrad)" stroke-width="3" fill="none" filter="url(#glow)"/>
  <path d="M394,261 Q420,250 440,260 Q460,270 480,260 Q500,250 520,254" stroke="#f0c060" stroke-width="1.5" fill="none" opacity="0.6" stroke-dasharray="4,3"/>
  <path d="M394,267 Q420,260 440,270 Q460,280 480,268 Q500,256 520,260" stroke="#a78bfa" stroke-width="1" fill="none" opacity="0.4" stroke-dasharray="3,4"/>

  <!-- Energy particles along path -->
  <circle cx="410" cy="252" r="3" fill="#f0c060" filter="url(#glow)" opacity="0.9"/>
  <circle cx="440" cy="248" r="3" fill="#f472b6" filter="url(#glow)" opacity="0.8"/>
  <circle cx="470" cy="254" r="3" fill="#34d399" filter="url(#glow)" opacity="0.9"/>
  <circle cx="500" cy="250" r="3" fill="#60a5fa" filter="url(#glow)" opacity="0.8"/>

  <!-- CLIENT (right figure) - lying down -->
  <ellipse cx="580" cy="260" rx="25" ry="25" fill="#1a1a3e" stroke="#34d399" stroke-width="1.5"/>
  <text x="580" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#34d399">😌</text>
  <!-- Body lying -->
  <rect x="532" y="250" width="20" height="75" rx="5" fill="#1a1a3e" stroke="#34d399" stroke-width="1" transform="rotate(90, 580, 285)"/>
  <ellipse cx="580" cy="285" rx="55" ry="14" fill="#1a1a3e" stroke="#34d399" stroke-width="1" opacity="0.7"/>
  <!-- Left hand receiving -->
  <ellipse cx="528" cy="258" rx="12" ry="8" fill="#34d399" opacity="0.85" filter="url(#handGlow)"/>
  <text x="580" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#34d399" font-weight="bold">ASSISTIDO</text>

  <!-- Energy aura around client -->
  <ellipse cx="580" cy="285" rx="72" ry="60" fill="none" stroke="#34d399" stroke-width="1" opacity="0.4" stroke-dasharray="5,4"/>
  <ellipse cx="580" cy="285" rx="90" ry="75" fill="none" stroke="#60a5fa" stroke-width="0.7" opacity="0.25" stroke-dasharray="6,5"/>

  <!-- Mesmer quote -->
  <rect x="248" y="350" width="396" height="60" rx="8" fill="#0f0f2e" stroke="#f0c060" stroke-width="0.8"/>
  <text x="446" y="372" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#fde68a" font-style="italic">"Existe um fluido universalmente difundido e continuamente ativo</text>
  <text x="446" y="387" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#fde68a" font-style="italic">que é o intermediário entre o homem e a natureza."</text>
  <text x="446" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#a78bfa">— Franz Anton Mesmer (1734–1815)</text>

  <!-- LEFT PANEL: Breath cycle -->
  <rect x="18" y="82" width="205" height="388" rx="12" fill="#1e1e4e" stroke="#a78bfa" stroke-width="1" opacity="0.9"/>
  <text x="120" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a78bfa" letter-spacing="0.5">PREPARAÇÃO DO TERAPEUTA</text>

  <!-- Circle cycle -->
  <circle cx="120" cy="220" r="70" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- Top: Respiração -->
  <circle cx="120" cy="152" r="24" fill="#2d1b4e" stroke="#a78bfa" stroke-width="2" filter="url(#glow)"/>
  <text x="120" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e9d5ff" font-weight="bold">Respi-</text>
  <text x="120" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e9d5ff" font-weight="bold">ração</text>
  <polygon points="120,148 116,140 124,140" fill="#a78bfa" opacity="0.7"/>

  <!-- Right: Energia -->
  <circle cx="188" cy="218" r="24" fill="#1a3a2a" stroke="#34d399" stroke-width="2" filter="url(#glow)"/>
  <text x="188" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6ee7b7" font-weight="bold">Ener-</text>
  <text x="188" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6ee7b7" font-weight="bold">gia</text>
  <polygon points="184,218 188,210 192,218" fill="#34d399" opacity="0.7" transform="rotate(90, 188, 218)"/>

  <!-- Bottom: Toque -->
  <circle cx="120" cy="286" r="24" fill="#2a1a3e" stroke="#f472b6" stroke-width="2" filter="url(#glow)"/>
  <text x="120" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fbcfe8" font-weight="bold">To-</text>
  <text x="120" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fbcfe8" font-weight="bold">que</text>
  <polygon points="120,288 116,296 124,296" fill="#f472b6" opacity="0.7"/>

  <!-- Left: Cura -->
  <circle cx="52" cy="218" r="24" fill="#2a2a0a" stroke="#f0c060" stroke-width="2" filter="url(#glow)"/>
  <text x="52" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fde68a" font-weight="bold">Cu-</text>
  <text x="52" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fde68a" font-weight="bold">ra</text>
  <polygon points="48,218 52,210 56,218" fill="#f0c060" opacity="0.7" transform="rotate(270, 52, 218)"/>

  <!-- Connecting arrows on cycle -->
  <path d="M140,157 Q165,165 182,200" stroke="#a78bfa" stroke-width="1.5" fill="none" stroke-dasharray="3,2" opacity="0.7"/>
  <path d="M182,238 Q170,268 142,278" stroke="#a78bfa" stroke-width="1.5" fill="none" stroke-dasharray="3,2" opacity="0.7"/>
  <path d="M98,283 Q72,270 58,240" stroke="#a78bfa" stroke-width="1.5" fill="none" stroke-dasharray="3,2" opacity="0.7"/>
  <path d="M58,198 Q72,168 98,159" stroke="#a78bfa" stroke-width="1.5" fill="none" stroke-dasharray="3,2" opacity="0.7"/>

  <!-- Steps description -->
  <rect x="28" y="328" width="185" height="135" rx="8" fill="#0f0f2e" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="120" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#a78bfa">Ciclo de Ativação</text>
  <text x="35" y="362" font-family="Arial, sans-serif" font-size="8.5" fill="#e9d5ff">1. Respirar fundo 3x</text>
  <text x="35" y="376" font-family="Arial, sans-serif" font-size="8.5" fill="#6ee7b7">2. Perceber a energia nas mãos</text>
  <text x="35" y="390" font-family="Arial, sans-serif" font-size="8.5" fill="#fbcfe8">3. Aplicar o toque com intenção</text>
  <text x="35" y="404" font-family="Arial, sans-serif" font-size="8.5" fill="#fde68a">4. Permitir o fluxo de cura</text>
  <text x="35" y="418" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">5. Encerrar com gratidão</text>
  <text x="35" y="432" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">6. Recomeçar o ciclo</text>
  <text x="35" y="454" font-family="Arial, sans-serif" font-size="8" fill="#a78bfa" font-style="italic">Intenção + Amor = Resultado</text>

  <!-- RIGHT PANEL: Techniques -->
  <rect x="678" y="82" width="205" height="388" rx="12" fill="#1e1e4e" stroke="#34d399" stroke-width="1" opacity="0.9"/>
  <text x="780" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#34d399" letter-spacing="0.5">TÉCNICAS DO TOQUE</text>

  <rect x="690" y="115" width="181" height="52" rx="6" fill="#0f1f30" stroke="#f472b6" stroke-width="0.8"/>
  <text x="780" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f472b6" font-weight="bold">🤲 Passe Magnético</text>
  <text x="780" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Movimento das mãos ao longo</text>
  <text x="780" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">do campo energético</text>

  <rect x="690" y="175" width="181" height="52" rx="6" fill="#0f1f30" stroke="#60a5fa" stroke-width="0.8"/>
  <text x="780" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#60a5fa" font-weight="bold">✋ Toque Direto</text>
  <text x="780" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Contato leve sobre pontos</text>
  <text x="780" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">específicos do corpo</text>

  <rect x="690" y="235" width="181" height="52" rx="6" fill="#0f1f30" stroke="#34d399" stroke-width="0.8"/>
  <text x="780" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34d399" font-weight="bold">💫 Irradiação</text>
  <text x="780" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Projeção de energia a curta</text>
  <text x="780" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">distância com intenção</text>

  <rect x="690" y="295" width="181" height="52" rx="6" fill="#0f1f30" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="780" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa" font-weight="bold">🌐 À Distância</text>
  <text x="780" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Aplicação remota via campo</text>
  <text x="780" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">morfogenético</text>

  <rect x="690" y="355" width="181" height="52" rx="6" fill="#0f1f30" stroke="#f0c060" stroke-width="0.8"/>
  <text x="780" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f0c060" font-weight="bold">🔥 Descarrego</text>
  <text x="780" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Remoção de energias densas</text>
  <text x="780" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">com passes específicos</text>

  <rect x="690" y="415" width="181" height="48" rx="6" fill="#0f1f30" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="780" y="433" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" font-weight="bold">⚡ Carrego</text>
  <text x="780" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Recarga energética do campo</text>
  <text x="780" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">sutil do assistido</text>

  <!-- Footer -->
  <rect x="0" y="545" width="900" height="55" fill="#0d0d28" opacity="0.85"/>
  <line x1="0" y1="545" x2="900" y2="545" stroke="#f472b6" stroke-width="1" opacity="0.3"/>
  <text x="450" y="566" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Módulo 04 · Terapeuta Consciente · Educa com Talento</text>
  <text x="450" y="582" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#f472b6" font-style="italic">"As mãos do terapeuta são extensões do coração e da intenção curadora."</text>
</svg>
