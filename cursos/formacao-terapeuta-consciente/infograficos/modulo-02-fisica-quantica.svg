<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f2e"/>
      <stop offset="100%" style="stop-color:#0d1b3e"/>
    </linearGradient>
    <linearGradient id="atomGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="600" fill="url(#bgGrad)"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="150" x2="900" y2="150" stroke="#60a5fa" stroke-width="0.2" opacity="0.15"/>
  <line x1="0" y1="300" x2="900" y2="300" stroke="#60a5fa" stroke-width="0.2" opacity="0.15"/>
  <line x1="0" y1="450" x2="900" y2="450" stroke="#60a5fa" stroke-width="0.2" opacity="0.15"/>
  <line x1="225" y1="0" x2="225" y2="600" stroke="#60a5fa" stroke-width="0.2" opacity="0.15"/>
  <line x1="450" y1="0" x2="450" y2="600" stroke="#60a5fa" stroke-width="0.2" opacity="0.15"/>
  <line x1="675" y1="0" x2="675" y2="600" stroke="#60a5fa" stroke-width="0.2" opacity="0.15"/>

  <!-- Stars -->
  <circle cx="50" cy="50" r="1" fill="white" opacity="0.5"/>
  <circle cx="820" cy="40" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="100" cy="550" r="1" fill="white" opacity="0.3"/>
  <circle cx="850" cy="520" r="1" fill="white" opacity="0.4"/>

  <!-- Header -->
  <rect x="0" y="0" width="900" height="72" fill="#0d0d28" opacity="0.9"/>
  <rect x="0" y="70" width="900" height="2" fill="#60a5fa" opacity="0.5"/>
  <text x="30" y="30" font-family="Arial, sans-serif" font-size="11" fill="#60a5fa" opacity="0.8" letter-spacing="2">MÓDULO 02</text>
  <text x="30" y="56" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#f0c060" filter="url(#glow)" letter-spacing="1">Física Quântica e a Ciência da Cura</text>
  <text x="870" y="42" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">4 Aulas · 90 min</text>

  <!-- Main title phrase -->
  <text x="450" y="110" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#60a5fa" filter="url(#softGlow)" letter-spacing="4">TUDO É ENERGIA</text>
  <text x="450" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" letter-spacing="1">Frequência · Vibração · Informação</text>

  <!-- CENTER: Atom -->
  <circle cx="450" cy="300" r="28" fill="url(#atomGrad)" filter="url(#softGlow)"/>
  <circle cx="450" cy="300" r="14" fill="#0f0f2e" stroke="#f0c060" stroke-width="1.5"/>
  <!-- Nucleus dots -->
  <circle cx="447" cy="297" r="4" fill="#f0c060" filter="url(#glow)"/>
  <circle cx="453" cy="303" r="3.5" fill="#60a5fa" filter="url(#glow)"/>
  <circle cx="450" cy="300" r="2.5" fill="#a78bfa"/>

  <!-- Electron orbit 1 - horizontal ellipse -->
  <ellipse cx="450" cy="300" rx="90" ry="30" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/>
  <!-- Electron on orbit 1 -->
  <circle cx="540" cy="300" r="6" fill="#60a5fa" filter="url(#glow)"/>
  <circle cx="360" cy="300" r="5" fill="#60a5fa" opacity="0.5"/>

  <!-- Electron orbit 2 - tilted ellipse 60deg -->
  <ellipse cx="450" cy="300" rx="90" ry="30" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.7" transform="rotate(60, 450, 300)"/>
  <circle cx="476" cy="378" r="6" fill="#a78bfa" filter="url(#glow)"/>
  <circle cx="424" cy="222" r="5" fill="#a78bfa" opacity="0.5"/>

  <!-- Electron orbit 3 - tilted ellipse 120deg -->
  <ellipse cx="450" cy="300" rx="90" ry="30" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.7" transform="rotate(120, 450, 300)"/>
  <circle cx="524" cy="378" r="6" fill="#34d399" filter="url(#glow)"/>
  <circle cx="376" cy="222" r="5" fill="#34d399" opacity="0.5"/>

  <!-- Quantum wave -->
  <path d="M290,230 Q310,200 330,230 Q350,260 370,220 Q390,180 410,230 Q430,280 450,230 Q470,180 490,230 Q510,280 530,220 Q550,160 570,220 Q590,280 610,230" stroke="#f0c060" stroke-width="2" fill="none" opacity="0.7" filter="url(#glow)"/>
  <text x="450" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fde68a">onda quântica de probabilidade</text>

  <!-- LEFT: Connection network -->
  <rect x="18" y="90" width="235" height="200" rx="10" fill="#1e1e4e" stroke="#a78bfa" stroke-width="1" opacity="0.8"/>
  <text x="135" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">CONEXÃO UNIVERSAL</text>

  <!-- Network nodes -->
  <circle cx="135" cy="160" r="16" fill="#2d1b4e" stroke="#a78bfa" stroke-width="1.5" filter="url(#glow)"/>
  <text x="135" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e9d5ff">VOCÊ</text>

  <circle cx="65" cy="130" r="12" fill="#1a1a3e" stroke="#60a5fa" stroke-width="1"/>
  <text x="65" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#bfdbfe">outro</text>
  <line x1="77" y1="136" x2="119" y2="152" stroke="#a78bfa" stroke-width="1" opacity="0.6" stroke-dasharray="3,2"/>

  <circle cx="205" cy="130" r="12" fill="#1a1a3e" stroke="#34d399" stroke-width="1"/>
  <text x="205" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#a7f3d0">campo</text>
  <line x1="193" y1="136" x2="151" y2="152" stroke="#34d399" stroke-width="1" opacity="0.6" stroke-dasharray="3,2"/>

  <circle cx="55" cy="200" r="12" fill="#1a1a3e" stroke="#f472b6" stroke-width="1"/>
  <text x="55" y="203" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#fbcfe8">mente</text>
  <line x1="67" y1="196" x2="119" y2="165" stroke="#f472b6" stroke-width="1" opacity="0.6" stroke-dasharray="3,2"/>

  <circle cx="215" cy="200" r="12" fill="#1a1a3e" stroke="#fbbf24" stroke-width="1"/>
  <text x="215" y="203" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#fde68a">cosmos</text>
  <line x1="203" y1="196" x2="151" y2="165" stroke="#fbbf24" stroke-width="1" opacity="0.6" stroke-dasharray="3,2"/>

  <circle cx="135" cy="258" r="12" fill="#1a1a3e" stroke="#60a5fa" stroke-width="1"/>
  <text x="135" y="261" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#bfdbfe">DNA</text>
  <line x1="135" y1="246" x2="135" y2="176" stroke="#60a5fa" stroke-width="1" opacity="0.6" stroke-dasharray="3,2"/>

  <!-- RIGHT: References -->
  <rect x="650" y="90" width="235" height="200" rx="10" fill="#1e1e4e" stroke="#34d399" stroke-width="1" opacity="0.8"/>
  <text x="767" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#34d399">CIENTISTAS-REFERÊNCIA</text>

  <rect x="665" y="122" width="205" height="46" rx="6" fill="#0f1f30" stroke="#60a5fa" stroke-width="0.8"/>
  <text x="677" y="140" font-family="Arial, sans-serif" font-size="11" fill="#60a5fa" font-weight="bold">⚛ Max Planck</text>
  <text x="677" y="157" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Quantização da energia — E = hν</text>

  <rect x="665" y="176" width="205" height="46" rx="6" fill="#0f1f30" stroke="#f0c060" stroke-width="0.8"/>
  <text x="677" y="194" font-family="Arial, sans-serif" font-size="11" fill="#f0c060" font-weight="bold">☀ Albert Einstein</text>
  <text x="677" y="211" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">E = mc² · Relatividade · Fótons</text>

  <rect x="665" y="230" width="205" height="46" rx="6" fill="#0f1f30" stroke="#34d399" stroke-width="0.8"/>
  <text x="677" y="248" font-family="Arial, sans-serif" font-size="11" fill="#34d399" font-weight="bold">🧬 Bruce Lipton</text>
  <text x="677" y="265" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Epigenética · Biologia da Crença</text>

  <!-- Bottom section: concepts -->
  <rect x="18" y="310" width="862" height="215" rx="12" fill="#1e1e4e" stroke="#f0c060" stroke-width="1" opacity="0.8"/>
  <text x="450" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f0c060" letter-spacing="2">PRINCÍPIOS QUÂNTICOS APLICADOS À CURA</text>

  <!-- 4 concept cards -->
  <rect x="35" y="348" width="185" height="158" rx="8" fill="#0f0f2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="127" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#60a5fa">🌊</text>
  <text x="127" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">ONDA-PARTÍCULA</text>
  <text x="127" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">A matéria existe como</text>
  <text x="127" y="421" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">probabilidade até ser</text>
  <text x="127" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">observada. O terapeuta</text>
  <text x="127" y="447" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">é o observador ativo.</text>
  <text x="127" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#bfdbfe" font-style="italic">Bohr · Heisenberg</text>
  <text x="127" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#bfdbfe" font-style="italic">Princípio da Incerteza</text>
  <text x="127" y="496" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#bfdbfe" font-style="italic">Colapso da Função de Onda</text>

  <rect x="235" y="348" width="185" height="158" rx="8" fill="#0f0f2e" stroke="#a78bfa" stroke-width="1"/>
  <text x="327" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#a78bfa">🔗</text>
  <text x="327" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#a78bfa">ENTRELAÇAMENTO</text>
  <text x="327" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">Partículas conectadas</text>
  <text x="327" y="421" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">influenciam-se à distância.</text>
  <text x="327" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">Base das terapias à</text>
  <text x="327" y="447" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">distância e do campo.</text>
  <text x="327" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ddd6fe" font-style="italic">Einstein–Podolsky–Rosen</text>
  <text x="327" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ddd6fe" font-style="italic">Não-localidade quântica</text>
  <text x="327" y="496" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ddd6fe" font-style="italic">Campo Morfogenético</text>

  <rect x="435" y="348" width="185" height="158" rx="8" fill="#0f0f2e" stroke="#34d399" stroke-width="1"/>
  <text x="527" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#34d399">🧬</text>
  <text x="527" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#34d399">EPIGENÉTICA</text>
  <text x="527" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">Crenças e emoções</text>
  <text x="527" y="421" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">reprogramam a expressão</text>
  <text x="527" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">do DNA. Você não é</text>
  <text x="527" y="447" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">prisioneiro dos genes.</text>
  <text x="527" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a7f3d0" font-style="italic">Bruce Lipton</text>
  <text x="527" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a7f3d0" font-style="italic">Biologia da Crença</text>
  <text x="527" y="496" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a7f3d0" font-style="italic">Neuroplasticidade</text>

  <rect x="635" y="348" width="228" height="158" rx="8" fill="#0f0f2e" stroke="#f0c060" stroke-width="1"/>
  <text x="749" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#f0c060">⚡</text>
  <text x="749" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#f0c060">CAMPO QUÂNTICO</text>
  <text x="749" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">Vácuo quântico contém</text>
  <text x="749" y="421" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">potencial infinito. Intenção</text>
  <text x="749" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">do terapeuta organiza</text>
  <text x="749" y="447" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">o campo para a cura.</text>
  <text x="749" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fde68a" font-style="italic">Campo Zero-Ponto</text>
  <text x="749" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fde68a" font-style="italic">Nassim Haramein</text>
  <text x="749" y="496" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fde68a" font-style="italic">Joe Dispenza</text>

  <!-- Footer -->
  <rect x="0" y="545" width="900" height="55" fill="#0d0d28" opacity="0.85"/>
  <line x1="0" y1="545" x2="900" y2="545" stroke="#60a5fa" stroke-width="1" opacity="0.3"/>
  <text x="450" y="566" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Módulo 02 · Terapeuta Consciente · Educa com Talento</text>
  <text x="450" y="582" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#60a5fa" font-style="italic">"A mente do universo é consciência pura — e você faz parte dela."</text>
</svg>
